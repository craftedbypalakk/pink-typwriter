<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pink Typewriter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0508}
canvas{display:block}
#loader{position:fixed;inset:0;z-index:100;
  background:radial-gradient(ellipse at 50% 40%,#2a0a1c,#0a0508);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  transition:opacity .7s;font-family:monospace}
#loader.hide{opacity:0;pointer-events:none}
#lt{font-size:11px;letter-spacing:5px;color:#e090b0}
#lb{width:200px;height:2px;background:#3a1828;border-radius:1px;overflow:hidden}
#lp{height:100%;width:0;background:linear-gradient(90deg,#c8507a,#ff9ec4);transition:width .3s}
#hint{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  font-size:10px;letter-spacing:3px;color:rgba(255,170,205,.45);
  z-index:10;pointer-events:none;font-family:monospace}
#mute{position:fixed;top:18px;right:18px;z-index:11;
  background:rgba(60,20,38,.7);border:1px solid rgba(255,150,190,.2);
  color:#f0a0c0;font-family:monospace;font-size:10px;letter-spacing:1px;
  padding:6px 12px;border-radius:4px;cursor:pointer}
</style>
</head>
<body>
<div id="loader"><div id="lt">LOADING</div><div id="lb"><div id="lp"></div></div></div>
<div id="hint">CLICK · THEN TYPE</div>
<button id="mute">♪ SOUND ON</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
const lp=document.getElementById("lp"),setP=p=>lp.style.width=p+"%";
window.addEventListener("load",()=>{
  if(!window.THREE){document.getElementById("lt").textContent="ERROR";return;}
  setP(20);init();
});

function init(){
const T=THREE;

// ═══ RENDERER ════════════════════════════════════════════════
const R=new T.WebGLRenderer({antialias:true});
R.setPixelRatio(Math.min(devicePixelRatio,2));
R.setSize(innerWidth,innerHeight);
R.shadowMap.enabled=true;R.shadowMap.type=T.PCFSoftShadowMap;
R.outputEncoding=T.sRGBEncoding;
R.toneMapping=T.ACESFilmicToneMapping;
R.toneMappingExposure=0.92; // slightly lower — preserves pink richness
document.body.appendChild(R.domElement);

const scene=new T.Scene();
scene.background=new T.Color(0x0a0508);

// Fixed camera — set after model loads
const cam=new T.PerspectiveCamera(45,innerWidth/innerHeight,.01,5000);
let camTarget=new T.Vector3();
addEventListener("resize",()=>{
  cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();
  R.setSize(innerWidth,innerHeight);
});

// ═══ ENVIRONMENT ══════════════════════════════════════════════
const pmg=new T.PMREMGenerator(R);
const es=new T.Scene();
es.add(new T.Mesh(new T.SphereGeometry(50,24,12),
  new T.MeshBasicMaterial({color:0x141018,side:T.BackSide})));
[[-9,8,5,0xfff0f4,11,9],[9,4,4,0xf0f0ff,8,8],
 [0,13,0,0xffffff,14,12],[0,4,-10,0xffd8e8,12,7]].forEach(a=>{
  const m=new T.Mesh(new T.PlaneGeometry(a[4],a[5]),
    new T.MeshBasicMaterial({color:a[3]}));
  m.position.set(a[0],a[1],a[2]);m.lookAt(0,0,0);es.add(m);
});
const env=pmg.fromScene(es,.03).texture;
scene.environment=env;pmg.dispose();

// ═══ LIGHTS ═══════════════════════════════════════════════════
scene.add(new T.AmbientLight(0xffffff,0.22));
const kL=new T.DirectionalLight(0xfff2f6,3.0);kL.position.set(-6,9,6);
kL.castShadow=true;kL.shadow.mapSize.set(2048,2048);
kL.shadow.bias=-.0003;kL.shadow.normalBias=.02;scene.add(kL);
const fL=new T.DirectionalLight(0xdfe4ff,0.9);fL.position.set(7,4,4);scene.add(fL);
const rimL=new T.DirectionalLight(0xffd0e4,2.0);rimL.position.set(-2,5,-8);scene.add(rimL);

// Contact shadow blob under machine
const blobC=document.createElement("canvas");blobC.width=blobC.height=256;
const bx=blobC.getContext("2d");
const bg=bx.createRadialGradient(128,128,8,128,128,128);
bg.addColorStop(0,"rgba(0,0,0,0.6)");bg.addColorStop(.5,"rgba(0,0,0,0.25)");
bg.addColorStop(1,"rgba(0,0,0,0)");
bx.fillStyle=bg;bx.fillRect(0,0,256,256);
const blobTex=new T.CanvasTexture(blobC);
const blob=new T.Mesh(new T.PlaneGeometry(7,5),
  new T.MeshBasicMaterial({map:blobTex,transparent:true,depthWrite:false}));
blob.rotation.x=-Math.PI/2;blob.position.y=-1.42;scene.add(blob);

// ═══ MATERIALS ════════════════════════════════════════════════
const MM=(c,rg,mt,ei=1.0)=>new T.MeshStandardMaterial(
  {color:new T.Color(c),roughness:rg,metalness:mt,envMap:env,envMapIntensity:ei});
function pinkMat(name){
  const n=(name||"").toLowerCase();
  if(n.includes("chrome"))   return MM(0xeae4ea,.08,1.0,1.4);
  if(n.includes("rubber"))   return MM(0x160810,.85,.1,.15);
  if(n.includes("tape"))     return MM(0x140510,.9,.0,.05);
  if(n.includes("button"))   return MM(0xf2eade,.3,.05,.5);
  if(n.includes("black"))    return MM(0x38101f,.4,.6,.9);
  if(n.includes("measure"))  return MM(0xc06f8c,.32,.5,1.0);
  if(n.includes("paper"))    return MM(0xf4e4ec,.9,.0,.15);
  if(n.includes("label"))    return MM(0xd8a850,.22,.85,1.4);
  return MM(0xd8467e,.22,.5,0.9);
}

// ═══ PAPER CANVAS ══════════════════════════════════════════════
// Ivory warm paper, typewriter font, realistic ink
const PW=1024,PH=1600;
const pcan=document.createElement("canvas");pcan.width=PW;pcan.height=PH;
const pctx=pcan.getContext("2d");

// Layout — generous margins like a real typewriter
const COLS=40;   // chars per line
const ROWS=28;   // visible lines
const MX=120;    // left margin (wider than before)
const MY=110;    // top margin (taller — more space before first line)
const LH=44;     // line height
const FS=30;     // font size
const CW=(PW-MX*2)/COLS;

let lines=[[]],curRow=0,curCol=0,scrollLines=0,caps=false;
const ptex=new T.CanvasTexture(pcan);
ptex.encoding=T.sRGBEncoding;
ptex.anisotropy=R.capabilities.getMaxAnisotropy();

// Per-character ink imperfections — stored permanently once set
const charCache={}; // "r,c" → {ox,oy,ink,skew}
function imperfect(r,c){
  const k=`${r},${c}`;
  if(!charCache[k]) charCache[k]={
    ox:(Math.random()-.5)*2.2,    // ±1px misalignment
    oy:(Math.random()-.5)*2.2,
    ink:0.68+Math.random()*0.28,  // ink density variation
    skew:(Math.random()-.5)*0.04  // tiny character rotation
  };
  return charCache[k];
}

let paperDirty=true, cursorVisible=true;

function drawPaper(){
  // Warm ivory base — #F8F2E8
  pctx.fillStyle="#F8F2E8";
  pctx.fillRect(0,0,PW,PH);

  // Paper grain — subtle noise texture
  const idata=pctx.getImageData(0,0,PW,PH);
  const d=idata.data;
  for(let i=0;i<d.length;i+=4){
    const n=(Math.random()-.5)*8;
    d[i]+=n;d[i+1]+=n;d[i+2]+=n;
  }
  pctx.putImageData(idata,0,0);

  // Subtle vignette at top (roller shadow)
  const vg=pctx.createLinearGradient(0,0,0,140);
  vg.addColorStop(0,"rgba(30,20,10,0.18)");
  vg.addColorStop(1,"rgba(30,20,10,0)");
  pctx.fillStyle=vg;pctx.fillRect(0,0,PW,140);

  // Red margin line
  pctx.strokeStyle="rgba(180,60,50,0.20)";pctx.lineWidth=1.5;
  pctx.beginPath();pctx.moveTo(MX-20,0);pctx.lineTo(MX-20,PH);pctx.stroke();

  // Horizontal ruled lines (very faint)
  pctx.strokeStyle="rgba(160,150,120,0.10)";pctx.lineWidth=0.8;
  for(let i=0;i<ROWS+2;i++){
    const y=MY+i*LH;
    pctx.beginPath();pctx.moveTo(0,y+LH-4);pctx.lineTo(PW,y+LH-4);pctx.stroke();
  }

  // Text
  pctx.font=`${FS}px 'Courier New',Courier,monospace`;
  pctx.textBaseline="top";
  for(let r=0;r<lines.length;r++){
    const sr=r-scrollLines;
    if(sr<0||sr>=ROWS)continue;
    const line=lines[r];
    const y=MY+sr*LH;
    for(let c=0;c<line.length;c++){
      const ch=line[c];
      if(!ch||ch===" ")continue;
      const {ox,oy,ink,skew}=imperfect(r,c);
      const x=MX+c*CW+ox;
      pctx.save();
      pctx.translate(x,y+oy);
      pctx.rotate(skew);
      pctx.fillStyle=`rgba(22,16,24,${ink})`;
      pctx.fillText(ch,0,0);
      pctx.restore();
    }
  }

  ptex.needsUpdate=true;
  paperDirty=false;
}

// Paper mesh — positioned deep in platen, only 35-40% visible
let paperMesh,paperGrp;
let paperBaseY=0, paperFeedY=0; // for paper feed animation

function buildPaper(box){
  const s=box.getSize(new T.Vector3());
  const c=box.getCenter(new T.Vector3());
  const pw=s.x*0.50, ph=pw*(PH/PW);

  // Slightly curved geometry to simulate roller wrap
  const geo=new T.PlaneGeometry(pw,ph,1,12); // 12 height segments for curve
  const pos=geo.attributes.position;
  // Bend the bottom of the paper slightly toward the camera (roller curve)
  for(let i=0;i<pos.count;i++){
    const y=pos.getY(i); // -ph/2 to +ph/2
    const t=(y/(ph/2)+1)/2; // 0=bottom, 1=top
    // Curve bottom toward viewer
    const curve=Math.pow(1-t,2)*0.08*pw;
    pos.setZ(i,curve);
  }
  pos.needsUpdate=true;
  geo.computeVertexNormals();

  const mat=new T.MeshStandardMaterial({
    map:ptex,roughness:.92,metalness:0,
    envMap:env,envMapIntensity:.12,
    side:T.DoubleSide
  });
  paperMesh=new T.Mesh(geo,mat);
  paperMesh.castShadow=true;

  paperGrp=new T.Group();
  paperGrp.add(paperMesh);

  // Position: paper center sits AT the platen top — mostly hidden inside
  paperBaseY = box.max.y + ph*0.05; // center just above top, 95% hidden inside
  paperFeedY = 0;

  paperGrp.position.set(c.x, paperBaseY, c.z+s.z*0.06);
  paperGrp.rotation.x=-0.10; // slight backward lean
  paperGrp.userData.baseX=c.x;
  paperGrp.userData.baseY=paperBaseY;
  scene.add(paperGrp);
  drawPaper();
}

// ═══ SOUNDS ═══════════════════════════════════════════════════
let AC=null,muted=false;
const ac=()=>{if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;};

function sndKey(){
  if(muted)return;const c=ac(),t=c.currentTime;
  // Sharp mechanical click — layered
  const buf=c.createBuffer(1,c.sampleRate*.06,c.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,4)*0.6;
  const src=c.createBufferSource();src.buffer=buf;
  const g=c.createGain();g.gain.value=0.22;
  src.connect(g);g.connect(c.destination);src.start(t);
  // Tonal thwack
  const o=c.createOscillator(),og=c.createGain();
  o.frequency.value=180+Math.random()*80;o.type="sine";
  og.gain.setValueAtTime(.08,t);og.gain.exponentialRampToValueAtTime(.001,t+.05);
  o.connect(og);og.connect(c.destination);o.start(t);o.stop(t+.06);
}

function sndSpace(){
  if(muted)return;const c=ac(),t=c.currentTime;
  const o=c.createOscillator(),g=c.createGain();
  o.frequency.value=260;o.type="sine";
  g.gain.setValueAtTime(.10,t);g.gain.exponentialRampToValueAtTime(.001,t+.07);
  o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.08);
}

function sndBell(){
  if(muted)return;const c=ac(),t=c.currentTime;
  [1760,3520,5280].forEach((f,i)=>{
    const o=c.createOscillator(),g=c.createGain();
    o.frequency.value=f;o.type="sine";
    g.gain.setValueAtTime(.0001,t);
    g.gain.exponentialRampToValueAtTime(.15/(i+1),t+.003);
    g.gain.exponentialRampToValueAtTime(.0001,t+1.4-i*.3);
    o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+1.5);
  });
}

function sndReturn(){
  if(muted)return;const c=ac(),t=c.currentTime;
  // Ratchet clicks
  for(let i=0;i<14;i++){
    const tt=t+i*.018+Math.random()*.006;
    const o=c.createOscillator(),g=c.createGain();
    o.type="square";o.frequency.value=400+Math.random()*200;
    g.gain.setValueAtTime(.04,tt);g.gain.exponentialRampToValueAtTime(.001,tt+.015);
    o.connect(g);g.connect(c.destination);o.start(tt);o.stop(tt+.02);
  }
  // Thunk at end
  const o=c.createOscillator(),g=c.createGain();
  o.frequency.value=120;o.type="sine";
  g.gain.setValueAtTime(.14,t+.26);g.gain.exponentialRampToValueAtTime(.001,t+.5);
  o.connect(g);g.connect(c.destination);o.start(t+.26);o.stop(t+.55);
}

function sndRoller(){
  if(muted)return;const c=ac(),t=c.currentTime;
  const o=c.createOscillator(),g=c.createGain();
  o.frequency.value=80;o.type="sine";
  g.gain.setValueAtTime(.06,t);g.gain.exponentialRampToValueAtTime(.001,t+.12);
  o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.14);
}

document.getElementById("mute").onclick=e=>{
  muted=!muted;e.target.textContent=muted?"♪ MUTED":"♪ SOUND ON";e.target.blur();
};

// ═══ MACHINE STATE — carriage, platen, ribbon ══════════════════
let modelRoot=null;
// These track visual animation targets (not real model bones — cosmetic offsets)
let carriageX=0;        // current visual carriage position (col units)
let machineVibX=0, machineVibY=0, machineVibRot=0; // impulse vibration
let platenRot=0;        // accumulated platen visual rotation
let ribbonPhase=0;      // ribbon scroll offset

// Find carriage-related meshes after load (Chrome/platen group)
let platens=[], carriageMeshes=[], ribbonMeshes=[];

function kickMachineVib(){
  machineVibX+=(Math.random()-.5)*0.004;
  machineVibY+=(Math.random()-.5)*0.003;
  machineVibRot+=(Math.random()-.5)*0.002;
}

// ═══ TYPING LOGIC ═════════════════════════════════════════════
let paperVib=0;
const hint=document.getElementById("hint");let hintGone=false;

function typeCh(ch){
  if(!lines[curRow])lines[curRow]=[];
  lines[curRow][curCol]=ch;
  curCol++;
  if(curCol===COLS-4) sndBell(); // bell near right margin
  if(curCol>=COLS) doNewline();
  paperDirty=true;
  // Advance platen slightly per character
  platenRot+=0.015;
  ribbonPhase+=0.5;
}

function doNewline(){
  curRow++;curCol=0;
  if(!lines[curRow])lines[curRow]=[];
  if(curRow-scrollLines>=ROWS-2) scrollLines++;
  // Paper feed: move paper up by one line height in world space
  // LH pixels on PH canvas → LH/PH fraction of paper height
  paperFeedY+=0.5; // accumulate upward feed
  paperDirty=true;
}

function backspace(){
  if(curCol>0){
    curCol--;
    delete charCache[`${curRow},${curCol}`];
    if(lines[curRow])lines[curRow][curCol]=null;
  } else if(curRow>0){
    curRow--;curCol=(lines[curRow]||[]).length;
  }
  paperDirty=true;
}

// ═══ KEY ANIMATION ════════════════════════════════════════════
const keyMap={};let keysReady=false;
const PRESS_DIST=-1.2; // local Z

function pressKey(code){
  if(!keysReady)return;
  const parts=keyMap[code];if(!parts)return;
  parts.forEach(obj=>{
    if(obj.userData.origZ===undefined)obj.userData.origZ=obj.position.z;
    obj.position.z=obj.userData.origZ+PRESS_DIST;
  });
}

function releaseKey(code){
  const parts=keyMap[code];if(!parts)return;
  const s0=parts.map(o=>o.position.z);
  const t0=parts.map(o=>o.userData.origZ??o.position.z);
  const ts=performance.now();
  (function spring(now){
    const p=Math.min((now-ts)/130,1);
    const e=p>=1?1:1-Math.pow(2,-10*p)*Math.cos((p*10-.75)*(Math.PI*2/3));
    parts.forEach((obj,i)=>obj.position.z=s0[i]+(t0[i]-s0[i])*e);
    if(p<1)requestAnimationFrame(spring);
    else parts.forEach((obj,i)=>obj.position.z=t0[i]);
  })(performance.now());
}

// Enter carriage return animation
let carriageReturning=false;
function doCarriageReturn(){
  if(carriageReturning)return;
  carriageReturning=true;
  sndReturn();
  sndRoller();
  // Animate paper feed upward
  const startFeed=paperFeedY;
  const targetFeed=paperFeedY; // already incremented in doNewline
  // Quick carriage return — eases out over 280ms
  const ts=performance.now();
  (function cr(now){
    const p=Math.min((now-ts)/280,1);
    const e=1-Math.pow(1-p,3); // ease out cubic
    if(paperGrp){
      paperGrp.position.y=paperGrp.userData.baseY+paperFeedY*0.44;
    }
    if(p<1)requestAnimationFrame(cr);
    else carriageReturning=false;
  })(performance.now());
}

// ═══ KEYBOARD EVENTS ══════════════════════════════════════════
addEventListener("keydown",e=>{
  if(AC&&AC.state==="suspended")AC.resume();
  if(!hintGone){hint.style.display="none";hintGone=true;}
  if(e.metaKey||e.ctrlKey||e.altKey)return;
  pressKey(e.code);
  const k=e.key;
  if(k==="Backspace"){
    e.preventDefault();sndKey();backspace();paperVib=0.2;kickMachineVib();return;
  }
  if(k==="Enter"){
    e.preventDefault();doNewline();doCarriageReturn();
    paperVib=0.5;kickMachineVib();return;
  }
  if(k==="CapsLock"){caps=!caps;return;}
  if(k==="Shift"||k==="Tab"||k==="Escape"||k.startsWith("Arrow")||
     k==="Control"||k==="Alt"||k==="Meta"){if(k==="Tab")e.preventDefault();return;}
  if(k===" "){
    e.preventDefault();sndSpace();paperVib=0.18;kickMachineVib();
    setTimeout(()=>typeCh(" "),30);return;
  }
  if(k.length===1){
    e.preventDefault();sndKey();kickMachineVib();paperVib=0.22;
    let c=k;
    if(caps&&/[a-z]/.test(c))c=c.toUpperCase();
    else if(caps&&/[A-Z]/.test(c)&&!e.shiftKey)c=c.toLowerCase();
    // Delay print 40-60ms — typebar travel time
    setTimeout(()=>typeCh(c),42+Math.random()*18);
  }
});
addEventListener("keyup",e=>releaseKey(e.code));

// ═══ LOAD MODEL ═══════════════════════════════════════════════
new T.GLTFLoader().load("typewriter_rigged.glb",g=>{
  setP(90);
  const m=g.scene;
  // Apply pink materials
  m.traverse(ch=>{
    if(!ch.isMesh)return;
    ch.castShadow=ch.receiveShadow=true;
    const arr=Array.isArray(ch.material)?ch.material:[ch.material];
    ch.material=arr.map(o=>{
      const nm=pinkMat(o&&o.name);nm.map=null;
      if(o&&o.normalMap){nm.normalMap=o.normalMap;nm.normalScale.set(.6,.6);}
      return nm;
    });
    if(ch.material.length===1)ch.material=ch.material[0];
    // Collect platen/chrome meshes for subtle animation
    const n=(ch.name||"").toLowerCase();
    if(n.includes("chrome")||n.includes("platen")||n.includes("knob"))
      platens.push(ch);
    if(n.includes("ribbon")||n.includes("tape"))
      ribbonMeshes.push(ch);
  });

  // Scale and center
  const b0=new T.Box3().setFromObject(m);
  const c0=b0.getCenter(new T.Vector3());
  const s0=b0.getSize(new T.Vector3());
  const scl=4/Math.max(s0.x,s0.y,s0.z);
  m.scale.setScalar(scl);
  m.position.set(-c0.x*scl,-c0.y*scl,-c0.z*scl);
  scene.add(m);
  modelRoot=m;
  // Store base position so vibration oscillates around it
  m.userData.baseX=m.position.x;
  m.userData.baseY=m.position.y;
  m.updateMatrixWorld(true);

  // Map key parts
  const kp={};
  m.traverse(ch=>{
    const nn=ch.name||"";
    if(!nn.startsWith("Key_"))return;
    let base=nn.replace(/_part\d+$/,"").replace(/_mesh$/,"");
    const code=base.replace("Key_","").trim();
    if(code.includes("Extra"))return;
    if(!kp[code])kp[code]=[];
    kp[code].push(ch);
  });
  Object.entries(kp).forEach(([code,objs])=>{
    keyMap[code]=objs;
    objs.forEach(o=>o.userData.origZ=o.position.z);
  });
  keysReady=true;
  console.log("Keys:",Object.keys(keyMap).length);

  // Bounds for camera + paper
  const box=new T.Box3().setFromObject(m);
  const c=box.getCenter(new T.Vector3());
  const s=box.getSize(new T.Vector3());

  // Shadow floor
  const sf=new T.Mesh(new T.PlaneGeometry(s.x*5,s.z*5),
    new T.ShadowMaterial({opacity:.45}));
  sf.rotation.x=-Math.PI/2;sf.position.y=box.min.y;sf.receiveShadow=true;scene.add(sf);
  blob.position.y=box.min.y+0.01;
  blob.scale.set(s.x/5,1,s.z/3.5);

  // Fixed camera — front, slightly elevated
  const maxDim=Math.max(s.x,s.y,s.z);
  cam.position.set(c.x,c.y+maxDim*.32,c.z+maxDim*1.85);
  camTarget.copy(c);
  cam.lookAt(camTarget);

  // Build paper
  buildPaper(box);

  setP(100);
  setTimeout(()=>document.getElementById("loader").classList.add("hide"),500);
},
xhr=>{if(xhr.total)setP(20+xhr.loaded/xhr.total*70);},
err=>{console.error(err);document.getElementById("lt").textContent="ERROR";});

// ═══ RENDER LOOP ══════════════════════════════════════════════
let cursorTimer=0,t0=performance.now();

(function loop(now){
  requestAnimationFrame(loop);
  const dt=Math.min((now-t0)/1000,.05);t0=now;

  // Machine vibration decay — oscillate around origin, not accumulate
  machineVibX*=0.72;machineVibY*=0.72;machineVibRot*=0.72;
  if(modelRoot){
    modelRoot.position.x=modelRoot.userData.baseX+(machineVibX);
    modelRoot.position.y=modelRoot.userData.baseY+(machineVibY);
    modelRoot.rotation.z=machineVibRot;
  }

  // Paper vibration decay
  if(paperVib>0){paperVib*=0.80;if(paperVib<0.001)paperVib=0;}
  if(paperGrp&&paperVib>0){
    paperGrp.position.x=paperGrp.userData.baseX+(Math.random()-.5)*paperVib*0.035;
    paperGrp.rotation.z=(Math.random()-.5)*paperVib*0.008;
  }

  // Paper feed position
  if(paperGrp&&!carriageReturning){
    const targetY=paperGrp.userData.baseY+paperFeedY*0.44;
    paperGrp.position.y+=(targetY-paperGrp.position.y)*0.12;
  }

  // Platen subtle rotation (visual only)
  if(platens.length>0&&platenRot>0){
    platenRot*=0.92;
    platens.forEach(p=>p.rotation.z=(p.userData.baseRotZ||0)+platenRot);
  }

  // Ribbon scroll (UV offset)
  if(ribbonMeshes.length>0){
    ribbonMeshes.forEach(r=>{
      if(r.material&&r.material.map)
        r.material.map.offset.x=(ribbonPhase*0.001)%1;
    });
  }

  if(paperDirty)drawPaper();

  R.render(scene,cam);
})(performance.now());
}
</script>
