<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Royal Typewriter — Type Something Real</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Cormorant+Garamond:ital,wght@0,500;1,500&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #1c1a17;
    --paper: #f5f0e4;
    --paper-shadow: #d9d2be;
    --room: #23262b;
    --brass: #a8874f;
    --ribbon-red: #8c2f2f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--room);
    font-family: 'Special Elite', 'Courier New', monospace;
    color: var(--paper);
  }

  #scene { position: fixed; inset: 0; display: block; }

  /* ---------- Loading ---------- */
  #loader {
    position: fixed; inset: 0; z-index: 30;
    background: var(--room);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px; transition: opacity .6s ease;
  }
  #loader.hidden { opacity: 0; pointer-events: none; }
  #loader .word {
    font-size: clamp(20px, 3.4vw, 34px);
    letter-spacing: .14em;
    color: var(--paper);
  }
  #loader .word .caret {
    display: inline-block; width: .55em; height: 1.05em;
    background: var(--paper); vertical-align: -0.15em;
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  #loader .pct {
    font-size: 12px; letter-spacing: .3em; color: var(--brass);
  }

  /* ---------- Header ---------- */
  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 20px 28px; pointer-events: none;
  }
  header h1 {
    font-size: 15px; font-weight: 400; letter-spacing: .32em;
    text-transform: uppercase; color: var(--paper); opacity: .85;
  }
  header .hint {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 15px; color: var(--paper); opacity: .55;
  }

  /* ---------- The page (signature element) ---------- */
  #page-wrap {
    position: fixed; z-index: 10;
    right: 26px; top: 74px; bottom: 26px;
    width: min(400px, 42vw);
    display: flex; flex-direction: column;
    perspective: 900px;
    pointer-events: none;
  }
  #page {
    pointer-events: auto;
    flex: 1; overflow-y: auto;
    background:
      linear-gradient(90deg, rgba(140,47,47,.16) 0, rgba(140,47,47,.16) 2px, transparent 2px) 40px 0 / 100% 100% no-repeat,
      repeating-linear-gradient(0deg, transparent 0 27px, rgba(28,26,23,.05) 27px 28px),
      var(--paper);
    color: var(--ink);
    border-radius: 2px;
    box-shadow:
      0 1px 0 var(--paper-shadow) inset,
      0 18px 40px rgba(0,0,0,.5),
      0 2px 6px rgba(0,0,0,.35);
    padding: 34px 30px 44px 52px;
    font-size: 16px; line-height: 28px;
    white-space: pre-wrap; word-break: break-word;
    transform: rotateX(1.5deg);
    scrollbar-width: thin;
    scrollbar-color: var(--paper-shadow) transparent;
  }
  #page:focus-visible { outline: 3px solid var(--brass); outline-offset: 3px; }

  #page .char { display: inline-block; }
  #page .char.stamp { animation: stamp .09s ease-out; }
  @keyframes stamp {
    0% { transform: scale(1.35); opacity: .3; }
    100% { transform: scale(1); opacity: 1; }
  }
  #page .caret {
    display: inline-block; width: 9px; height: 18px;
    background: var(--ink); opacity: .8; vertical-align: -3px;
    animation: blink 1.1s steps(1) infinite;
  }

  #page-meta {
    pointer-events: auto;
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 4px 0;
    font-size: 11px; letter-spacing: .22em; color: var(--paper); opacity: .6;
  }
  #page-meta button {
    all: unset; cursor: pointer; letter-spacing: .22em;
    font-family: inherit; font-size: 11px;
    color: var(--paper); border-bottom: 1px solid transparent;
  }
  #page-meta button:hover, #page-meta button:focus-visible {
    color: var(--brass); border-bottom-color: var(--brass);
  }

  /* ---------- Footer ---------- */
  footer {
    position: fixed; left: 28px; bottom: 22px; z-index: 10;
    font-size: 11px; letter-spacing: .2em; color: var(--paper);
    opacity: .45; pointer-events: none;
  }

  /* Sound toggle */
  #sound {
    position: fixed; left: 28px; bottom: 48px; z-index: 10;
    all-unset: unset; background: none; border: none; cursor: pointer;
    font-family: 'Special Elite', monospace; font-size: 11px;
    letter-spacing: .22em; color: var(--paper); opacity: .65; padding: 4px 0;
  }
  #sound:hover, #sound:focus-visible { color: var(--brass); opacity: 1; }

  @media (max-width: 720px) {
    header { padding: 14px 16px; }
    header .hint { display: none; }
    #page-wrap {
      left: 12px; right: 12px; width: auto;
      top: auto; bottom: 12px; height: 38vh;
    }
    footer, #sound { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    #page .char.stamp { animation: none; }
    #page .caret, #loader .word .caret { animation: none; }
  }
</style>
</head>
<body>

<div id="loader" role="status" aria-live="polite">
  <div class="word">ROYAL<span class="caret"></span></div>
  <div class="pct" id="loader-pct">LOADING 0%</div>
</div>

<header>
  <h1>Royal Typewriter</h1>
  <span class="hint">Just start typing — the machine will follow.</span>
</header>

<canvas id="scene" aria-label="3D vintage Royal typewriter. Press keys on your keyboard to type."></canvas>

<div id="page-wrap">
  <div id="page" tabindex="0" aria-label="Typed page"></div>
  <div id="page-meta">
    <span id="counter">LINE 1 · COL 0</span>
    <button id="clear" type="button">New sheet</button>
  </div>
</div>

<button id="sound" type="button" aria-pressed="true">SOUND ON</button>
<footer>DRAG TO ORBIT · SCROLL TO ZOOM</footer>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ============================================================
   Scene
   ============================================================ */
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x23262b);
scene.fog = new THREE.Fog(0x23262b, 60, 160);

const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 500);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.enablePan = false;
controls.minPolarAngle = 0.55;
controls.maxPolarAngle = 1.42;

// Lighting: warm desk-lamp key, cool fill, soft rim
scene.add(new THREE.AmbientLight(0xbfc4cc, 0.55));
const keyLight = new THREE.DirectionalLight(0xfff1dd, 2.4);
keyLight.position.set(18, 30, 22);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
scene.add(keyLight);
const fill = new THREE.DirectionalLight(0x9fb4d8, 0.7);
fill.position.set(-24, 14, -10);
scene.add(fill);
const rim = new THREE.DirectionalLight(0xffffff, 0.6);
rim.position.set(0, 18, -28);
scene.add(rim);

/* ============================================================
   Model
   ============================================================ */
const keyGroups = {};        // code -> [Object3D]
const restPositions = new Map(); // Object3D -> THREE.Vector3
const activePresses = new Map(); // code -> {t, releasing}
let pressAxis = new THREE.Vector3(0, 0, -1); // refined after load
let pressDepth = 0.32;

const loaderEl = document.getElementById('loader');
const pctEl = document.getElementById('loader-pct');

new GLTFLoader().load(
  'typewriter_rigged_clean.glb',
  (gltf) => {
    const model = gltf.scene;
    model.traverse((obj) => {
      if (obj.isMesh) { obj.castShadow = true; obj.receiveShadow = true; }
      const m = obj.name.match(/^Key_([A-Za-z0-9]+?)(?:_part\d+)?$/);
      if (m) {
        (keyGroups[m[1]] ??= []).push(obj);
        restPositions.set(obj, obj.position.clone());
      }
    });
    scene.add(model);

    // Frame the machine like a desk shot
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const radius = Math.max(size.x, size.y, size.z);
    controls.target.copy(center);
    camera.position.set(
      center.x - radius * 0.72,
      center.y + radius * 0.55,
      center.z + radius * 1.05
    );
    camera.near = radius / 100;
    camera.far = radius * 20;
    camera.updateProjectionMatrix();
    controls.minDistance = radius * 0.6;
    controls.maxDistance = radius * 2.4;
    controls.update();

    // Ground plane to catch the shadow
    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(radius * 2.2, 48),
      new THREE.ShadowMaterial({ opacity: 0.35 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = box.min.y + 0.001;
    ground.receiveShadow = true;
    scene.add(ground);

    // Derive press direction: convert world-down into the keys' parent
    // local space, so keys always sink straight down on screen no matter
    // how the model is oriented internally.
    const sample = keyGroups['KeyA']?.[0];
    if (sample && sample.parent) {
      sample.parent.updateWorldMatrix(true, false);
      const q = sample.parent.getWorldQuaternion(new THREE.Quaternion()).invert();
      pressAxis.set(0, -1, 0).applyQuaternion(q).normalize();
      pressDepth = 0.32;
    }

    loaderEl.classList.add('hidden');
    focusPage();
  },
  (xhr) => {
    if (xhr.total) {
      pctEl.textContent = `LOADING ${Math.round((xhr.loaded / xhr.total) * 100)}%`;
    }
  },
  (err) => {
    pctEl.textContent = 'COULD NOT LOAD THE TYPEWRITER MODEL';
    console.error(err);
  }
);

/* ============================================================
   Key press animation
   ============================================================ */
function pressKey(code) {
  const parts = keyGroups[code];
  if (!parts) return false;
  activePresses.set(code, { phase: 'down', t: 0 });
  return true;
}
function releaseKey(code) {
  const st = activePresses.get(code);
  if (st) st.phase = 'up';
}

const clock = new THREE.Clock();
function animate() {
  const dt = Math.min(clock.getDelta(), 0.05);

  for (const [code, st] of activePresses) {
    const speed = st.phase === 'down' ? 14 : 8;
    st.t += (st.phase === 'down' ? 1 : -1) * speed * dt;
    st.t = Math.max(0, Math.min(1, st.t));
    const ease = st.t * (2 - st.t); // ease-out
    for (const obj of keyGroups[code]) {
      const rest = restPositions.get(obj);
      obj.position.copy(rest).addScaledVector(pressAxis, ease * pressDepth);
    }
    if (st.phase === 'up' && st.t === 0) activePresses.delete(code);
  }

  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ============================================================
   Sound — synthesized, no assets
   ============================================================ */
let audioCtx = null;
let soundOn = true;
function ctx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function clack() {
  if (!soundOn) return;
  const ac = ctx(), t = ac.currentTime;
  const buf = ac.createBuffer(1, ac.sampleRate * 0.05, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2.4);
  const src = ac.createBufferSource(); src.buffer = buf;
  const bp = ac.createBiquadFilter(); bp.type = 'bandpass';
  bp.frequency.value = 2200 + Math.random() * 900; bp.Q.value = 1.1;
  const g = ac.createGain();
  g.gain.setValueAtTime(0.5 + Math.random() * 0.2, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
  src.connect(bp).connect(g).connect(ac.destination);
  src.start(t);
}
function ding() {
  if (!soundOn) return;
  const ac = ctx(), t = ac.currentTime;
  const o = ac.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(2093, t); // C7 bell
  const g = ac.createGain();
  g.gain.setValueAtTime(0.25, t);
  g.gain.exponentialRampToValueAtTime(0.0005, t + 0.9);
  o.connect(g).connect(ac.destination);
  o.start(t); o.stop(t + 0.95);
}
function carriageReturn() {
  if (!soundOn) return;
  const ac = ctx(), t = ac.currentTime;
  const buf = ac.createBuffer(1, ac.sampleRate * 0.28, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.4 * (1 - i / d.length);
  const src = ac.createBufferSource(); src.buffer = buf;
  const lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 900;
  const g = ac.createGain();
  g.gain.setValueAtTime(0.28, t);
  g.gain.linearRampToValueAtTime(0.0, t + 0.28);
  src.connect(lp).connect(g).connect(ac.destination);
  src.start(t);
}

const soundBtn = document.getElementById('sound');
soundBtn.addEventListener('click', () => {
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? 'SOUND ON' : 'SOUND OFF';
  soundBtn.setAttribute('aria-pressed', String(soundOn));
});

/* ============================================================
   The page — typed text with typewriter imperfections
   ============================================================ */
const page = document.getElementById('page');
const counter = document.getElementById('counter');
const BELL_COL = 58;
let col = 0, line = 1;

const caret = document.createElement('span');
caret.className = 'caret';
page.appendChild(caret);

function updateCounter() { counter.textContent = `LINE ${line} · COL ${col}`; }
function focusPage() { page.focus({ preventScroll: true }); }

function typeChar(ch) {
  const span = document.createElement('span');
  span.className = 'char stamp';
  span.textContent = ch;
  // Imperfect strike: tiny random tilt, offset, and ink weight
  const r = (Math.random() - 0.5);
  span.style.transform += ` rotate(${(r * 2.4).toFixed(2)}deg) translateY(${(r * 1.6).toFixed(2)}px)`;
  span.style.opacity = (0.78 + Math.random() * 0.22).toFixed(2);
  page.insertBefore(span, caret);
  col++;
  if (col === BELL_COL) ding();
  updateCounter();
  page.scrollTop = page.scrollHeight;
}
function newline() {
  page.insertBefore(document.createTextNode('\n'), caret);
  col = 0; line++;
  carriageReturn();
  updateCounter();
  page.scrollTop = page.scrollHeight;
}
function backspace() {
  const prev = caret.previousSibling;
  if (!prev) return;
  if (prev.nodeType === Node.TEXT_NODE && prev.textContent === '\n') {
    line = Math.max(1, line - 1);
    prev.remove();
    // recount column on the now-current line
    let c = 0, n = caret.previousSibling;
    while (n && !(n.nodeType === Node.TEXT_NODE && n.textContent === '\n')) { c++; n = n.previousSibling; }
    col = c;
  } else {
    prev.remove();
    col = Math.max(0, col - 1);
  }
  updateCounter();
}

document.getElementById('clear').addEventListener('click', () => {
  page.querySelectorAll('.char').forEach(el => el.remove());
  [...page.childNodes].forEach(n => { if (n.nodeType === Node.TEXT_NODE) n.remove(); });
  col = 0; line = 1;
  carriageReturn();
  updateCounter();
  focusPage();
});

/* ============================================================
   Keyboard wiring — KeyboardEvent.code matches node names 1:1
   ============================================================ */
window.addEventListener('keydown', (e) => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.repeat) { e.preventDefault(); return; }

  const handledKey = pressKey(e.code);

  if (e.key.length === 1) {
    e.preventDefault();
    typeChar(e.key === ' ' ? '\u00A0' : e.key);
    clack();
  } else if (e.code === 'Enter') {
    e.preventDefault();
    newline();
  } else if (e.code === 'Backspace') {
    e.preventDefault();
    backspace();
    clack();
  } else if (handledKey) {
    // Shift / CapsLock / Tab — animate only
    if (e.code === 'Tab') e.preventDefault();
  }
});
window.addEventListener('keyup', (e) => releaseKey(e.code));

/* ============================================================
   Click / tap a 3D key to press it
   ============================================================ */
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let downAt = null;
canvas.addEventListener('pointerdown', (e) => { downAt = [e.clientX, e.clientY]; });
canvas.addEventListener('pointerup', (e) => {
  if (!downAt) return;
  const moved = Math.hypot(e.clientX - downAt[0], e.clientY - downAt[1]);
  downAt = null;
  if (moved > 6) return; // it was an orbit drag
  pointer.set((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(scene.children, true);
  for (const hit of hits) {
    const m = hit.object.name.match(/^Key_([A-Za-z0-9]+?)(?:_part\d+)?$/);
    if (m) {
      const code = m[1];
      pressKey(code);
      setTimeout(() => releaseKey(code), 130);
      // Mirror the strike onto the page
      const map = { Space: '\u00A0', Comma: ',', Period: '.', Slash: '/', Semicolon: ';', Quote: "'", BracketLeft: '[', BracketRight: ']', Minus: '-', Backquote: '`' };
      if (code === 'Enter') newline();
      else if (code === 'Backspace') { backspace(); clack(); }
      else if (/^Key([A-Z])$/.test(code)) { typeChar(code.slice(3).toLowerCase()); clack(); }
      else if (/^Digit(\d)$/.test(code)) { typeChar(code.slice(5)); clack(); }
      else if (map[code] !== undefined) { typeChar(map[code]); clack(); }
      break;
    }
  }
});
</script>
</body>
</html>
