<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Royal Typewriter — Type Something Real</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Cormorant+Garamond:ital,wght@0,500;1,500&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #1c1a17;
    --paper: #f5f0e4;
    --room: #23262b;
    --brass: #a8874f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--room);
    font-family: 'Special Elite', 'Courier New', monospace;
    color: var(--paper);
  }
  #scene { position: fixed; inset: 0; display: block; }

  /* ---------- Loading ---------- */
  #loader {
    position: fixed; inset: 0; z-index: 30;
    background: var(--room);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px; transition: opacity .6s ease;
  }
  #loader.hidden { opacity: 0; pointer-events: none; }
  #loader .word {
    font-size: clamp(20px, 3.4vw, 34px);
    letter-spacing: .14em;
  }
  #loader .word .caret {
    display: inline-block; width: .55em; height: 1.05em;
    background: var(--paper); vertical-align: -0.15em;
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  #loader .pct { font-size: 12px; letter-spacing: .3em; color: var(--brass); }

  /* ---------- Chrome ---------- */
  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 20px 28px; pointer-events: none;
  }
  header h1 {
    font-size: 15px; font-weight: 400; letter-spacing: .32em;
    text-transform: uppercase; opacity: .85;
  }
  header .hint {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 15px; opacity: .55;
  }
  #hud {
    position: fixed; left: 28px; bottom: 22px; z-index: 10;
    display: flex; flex-direction: column; gap: 8px;
    font-size: 11px; letter-spacing: .22em;
  }
  #hud .row { display: flex; gap: 22px; align-items: center; }
  #counter { opacity: .6; }
  #hud button {
    all: unset; cursor: pointer; letter-spacing: .22em;
    font-family: inherit; font-size: 11px; opacity: .7; padding: 3px 0;
  }
  #hud button:hover, #hud button:focus-visible { color: var(--brass); opacity: 1; }
  #orbit-hint { opacity: .4; pointer-events: none; }

  /* End-of-page bell note */
  #note {
    position: fixed; right: 28px; bottom: 22px; z-index: 10;
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 15px; opacity: 0; transition: opacity .5s ease;
    pointer-events: none;
  }
  #note.show { opacity: .7; }

  @media (max-width: 720px) {
    header { padding: 14px 16px; }
    header .hint { display: none; }
    #orbit-hint { display: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    #loader .word .caret { animation: none; }
  }
</style>
</head>
<body>

<div id="loader" role="status" aria-live="polite">
  <div class="word">ROYAL<span class="caret"></span></div>
  <div class="pct" id="loader-pct">LOADING 0%</div>
</div>

<header>
  <h1>Royal Typewriter</h1>
  <span class="hint">Just start typing — it lands on the page.</span>
</header>

<canvas id="scene" aria-label="3D vintage Royal typewriter. Type on your keyboard and the text appears on the paper in the machine."></canvas>

<div id="hud">
  <div class="row">
    <span id="counter">LINE 1 · COL 0</span>
    <button id="newsheet" type="button">New sheet</button>
    <button id="sound" type="button" aria-pressed="true">Sound on</button>
  </div>
  <span id="orbit-hint">DRAG TO ORBIT · SCROLL TO ZOOM</span>
</div>

<div id="note">ding — near the margin</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ============================================================
   Scene
   ============================================================ */
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x23262b);
scene.fog = new THREE.Fog(0x23262b, 60, 160);

const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 500);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.enablePan = false;
controls.minPolarAngle = 0.5;
controls.maxPolarAngle = 1.42;

scene.add(new THREE.AmbientLight(0xbfc4cc, 0.55));
const keyLight = new THREE.DirectionalLight(0xfff1dd, 2.4);
keyLight.position.set(18, 30, 22);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
scene.add(keyLight);
const fill = new THREE.DirectionalLight(0x9fb4d8, 0.7);
fill.position.set(-24, 14, -10);
scene.add(fill);
const rim = new THREE.DirectionalLight(0xffffff, 0.6);
rim.position.set(0, 18, -28);
scene.add(rim);

/* ============================================================
   Paper typesetting constants
   (derived from the GLB's paper mesh UV↔world fit)
   ============================================================ */
const TEX = 512;                 // paper texture size
const LINE_PX = 23;              // one carriage-return step, in texture px
const STRIKE_ROW = 307;          // texture row of the strike line (v≈0.60)
const COL0_PX = 96;              // first column, right of the red margin line
const CHAR_PX = 10;              // 10-pitch type
const MAX_COL = 38;              // hard right stop
const BELL_COL = 33;             // margin bell
const TOP_ROW = 468;             // texture row of line 1 (near the sheet's top edge)
const PHASE_A = Math.round((TOP_ROW - STRIKE_ROW) / LINE_PX);  // lines until type reaches the platen
const RISE_PER_LINE = 0.25;      // physical mesh rise per return during phase A
                                 // (sheet starts at its authored position and only rises)
// world movement of the paper mesh per line feed = d(world)/dv * (LINE_PX/TEX)
const FEED_VEC = new THREE.Vector3(0.0033, 1.0157, 0.4244);

/* ============================================================
   Model + paper texture
   ============================================================ */
const keyGroups = {};
const restPositions = new Map();
const activePresses = new Map();
let pressAxis = new THREE.Vector3(0, 0, -1);
let pressDepth = 0.32;

let paperMesh = null;
let paperHome = null;
let paperBase = null;        // pristine paper image
let paperCanvas = null, pctx = null, lineCanvas = null, lctx = null;
let paperTexture = null;

const loaderEl = document.getElementById('loader');
const pctEl = document.getElementById('loader-pct');

new GLTFLoader().load(
  'typewriter_rigged_clean.glb?v=3',
  (gltf) => {
    const model = gltf.scene;
    model.traverse((obj) => {
      if (obj.isMesh) { obj.castShadow = true; obj.receiveShadow = true; }
      const m = obj.name.match(/^Key_([A-Za-z0-9]+?)(?:_part\d+)?$/);
      if (m) {
        (keyGroups[m[1]] ??= []).push(obj);
        restPositions.set(obj, obj.position.clone());
      }
      if (obj.isMesh && /Paper/.test(obj.name)) paperMesh = obj;
    });
    scene.add(model);

    // --- Paper canvas: draw typed text into the paper's own texture ---
    if (paperMesh) {
      paperHome = paperMesh.position.clone();
      paperBase = paperMesh.material.map.image;
      paperCanvas = document.createElement('canvas');
      paperCanvas.width = paperCanvas.height = TEX;
      pctx = paperCanvas.getContext('2d');
      lineCanvas = document.createElement('canvas');
      lineCanvas.width = TEX; lineCanvas.height = LINE_PX + 8;
      lctx = lineCanvas.getContext('2d');

      paperTexture = new THREE.CanvasTexture(paperCanvas);
      paperTexture.flipY = false;                       // match glTF convention
      paperTexture.colorSpace = THREE.SRGBColorSpace;
      paperTexture.anisotropy = renderer.capabilities.getMaxAnisotropy();
      paperMesh.material.map = paperTexture;
      redrawPaper();
    }

    // Frame the machine
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const radius = Math.max(size.x, size.y, size.z);
    controls.target.copy(center);
    camera.position.set(center.x - radius * 0.55, center.y + radius * 0.62, center.z + radius * 1.0);
    camera.near = radius / 100;
    camera.far = radius * 20;
    camera.updateProjectionMatrix();
    controls.minDistance = radius * 0.55;
    controls.maxDistance = radius * 2.4;
    controls.update();

    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(radius * 2.2, 48),
      new THREE.ShadowMaterial({ opacity: 0.35 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = box.min.y + 0.001;
    ground.receiveShadow = true;
    scene.add(ground);

    // Press direction: world-down converted to the keys' parent space
    const sample = keyGroups['KeyA']?.[0];
    if (sample && sample.parent) {
      sample.parent.updateWorldMatrix(true, false);
      const q = sample.parent.getWorldQuaternion(new THREE.Quaternion()).invert();
      pressAxis.set(0, -1, 0).applyQuaternion(q).normalize();
    }

    loaderEl.classList.add('hidden');
  },
  (xhr) => {
    if (xhr.total) pctEl.textContent = `LOADING ${Math.round((xhr.loaded / xhr.total) * 100)}%`;
  },
  (err) => {
    pctEl.textContent = 'COULD NOT LOAD THE TYPEWRITER MODEL';
    console.error(err);
  }
);

/* ============================================================
   The page — text drawn onto the 3D paper
   Real-typewriter rules: backspace moves back without erasing,
   typing over an existing character overstrikes it.
   ============================================================ */
let lines = [[]];   // each line: array of stamps {col, ch, dx, dy, rot, ink}
let col = 0;
let lineIndex = 0;

const counter = document.getElementById('counter');
const note = document.getElementById('note');
let noteTimer = null;

function updateCounter() {
  counter.textContent = `LINE ${lineIndex + 1} · COL ${col}`;
}
function flashNote(text) {
  note.textContent = text;
  note.classList.add('show');
  clearTimeout(noteTimer);
  noteTimer = setTimeout(() => note.classList.remove('show'), 1600);
}

// The paper texture is applied vertically flipped on the sheet, so each
// line is rendered normally to a small canvas, then blitted flipped.
function drawLineFlipped(stamps, rowCenter) {
  lctx.clearRect(0, 0, lineCanvas.width, lineCanvas.height);
  lctx.font = `15px 'Special Elite', 'Courier New', monospace`;
  lctx.textBaseline = 'middle';
  for (const s of stamps) {
    lctx.fillStyle = `rgba(28, 26, 33, ${s.ink})`;
    lctx.save();
    lctx.translate(COL0_PX + s.col * CHAR_PX + s.dx, lineCanvas.height / 2 + s.dy);
    lctx.rotate(s.rot);
    lctx.fillText(s.ch, 0, 0);
    lctx.restore();
  }
  pctx.save();
  pctx.translate(0, rowCenter + lineCanvas.height / 2);
  pctx.scale(1, -1);
  pctx.drawImage(lineCanvas, 0, 0);
  pctx.restore();
}

function redrawPaper() {
  if (!pctx) return;
  const a = Math.min(lineIndex, PHASE_A);   // lines spent descending from the top
  const b = lineIndex - a;                  // lines fed past the platen (conveyor)
  const baseOff = (b * LINE_PX) % TEX;

  pctx.clearRect(0, 0, TEX, TEX);
  // The ruling, margin line and punch holes travel with the paper:
  pctx.drawImage(paperBase, 0, baseOff, TEX, TEX);
  pctx.drawImage(paperBase, 0, baseOff - TEX, TEX, TEX);

  for (let i = 0; i < lines.length; i++) {
    if (!lines[i].length) continue;
    const row = TOP_ROW - i * LINE_PX + b * LINE_PX;
    if (row < -LINE_PX || row > TEX + LINE_PX) continue;  // fed past the top
    drawLineFlipped(lines[i], row);
  }
  paperTexture.needsUpdate = true;

  // Physical feed: the sheet rests at its authored position and rises a
  // little with every return until the type reaches the platen; after that
  // the texture conveyor above carries the motion.
  if (paperMesh) {
    paperMesh.position.copy(paperHome)
      .addScaledVector(FEED_VEC, a * RISE_PER_LINE);
  }
}

function typeChar(ch) {
  if (col >= MAX_COL) carriageReturnAction();   // auto return at the margin
  const r = () => (Math.random() - 0.5);
  lines[lineIndex].push({
    col, ch,
    dx: r() * 1.6, dy: r() * 1.4, rot: r() * 0.05,
    ink: 0.62 + Math.random() * 0.3,
  });
  col++;
  if (col === BELL_COL) { ding(); flashNote('ding — near the margin'); }
  updateCounter();
  redrawPaper();
}
function carriageReturnAction() {
  lines.push([]);
  lineIndex++;
  col = 0;
  carriageReturn();
  updateCounter();
  redrawPaper();
}
function backspaceAction() {
  // A real typewriter backspace steps the carriage back — the ink stays.
  if (col > 0) col--;
  updateCounter();
}
function newSheet() {
  lines = [[]];
  lineIndex = 0;
  col = 0;
  carriageReturn();
  updateCounter();
  redrawPaper();
}
document.getElementById('newsheet').addEventListener('click', newSheet);

/* ============================================================
   Key press animation
   ============================================================ */
function pressKey(code) {
  if (code === 'Digit1') code = 'KeyL';   // Royals have no 1 — typists used L
  const parts = keyGroups[code];
  if (!parts) return false;
  activePresses.set(code, { phase: 'down', t: 0 });
  return true;
}
function releaseKey(code) {
  if (code === 'Digit1') code = 'KeyL';
  const st = activePresses.get(code);
  if (st) st.phase = 'up';
}

const clock = new THREE.Clock();
function animate() {
  const dt = Math.min(clock.getDelta(), 0.05);
  for (const [code, st] of activePresses) {
    const speed = st.phase === 'down' ? 14 : 8;
    st.t += (st.phase === 'down' ? 1 : -1) * speed * dt;
    st.t = Math.max(0, Math.min(1, st.t));
    const ease = st.t * (2 - st.t);
    for (const obj of keyGroups[code]) {
      const rest = restPositions.get(obj);
      obj.position.copy(rest).addScaledVector(pressAxis, ease * pressDepth);
    }
    if (st.phase === 'up' && st.t === 0) activePresses.delete(code);
  }
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ============================================================
   Sound — synthesized, no assets
   ============================================================ */
let audioCtx = null;
let soundOn = true;
function ctx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function clack(vol = 0.55) {
  if (!soundOn) return;
  const ac = ctx(), t = ac.currentTime;
  const buf = ac.createBuffer(1, ac.sampleRate * 0.05, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2.4);
  const src = ac.createBufferSource(); src.buffer = buf;
  const bp = ac.createBiquadFilter(); bp.type = 'bandpass';
  bp.frequency.value = 2200 + Math.random() * 900; bp.Q.value = 1.1;
  const g = ac.createGain();
  g.gain.setValueAtTime(vol + Math.random() * 0.15, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
  src.connect(bp).connect(g).connect(ac.destination);
  src.start(t);
}
function ding() {
  if (!soundOn) return;
  const ac = ctx(), t = ac.currentTime;
  const o = ac.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(2093, t);
  const g = ac.createGain();
  g.gain.setValueAtTime(0.25, t);
  g.gain.exponentialRampToValueAtTime(0.0005, t + 0.9);
  o.connect(g).connect(ac.destination);
  o.start(t); o.stop(t + 0.95);
}
function carriageReturn() {
  if (!soundOn) return;
  const ac = ctx(), t = ac.currentTime;
  const buf = ac.createBuffer(1, ac.sampleRate * 0.28, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.4 * (1 - i / d.length);
  const src = ac.createBufferSource(); src.buffer = buf;
  const lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 900;
  const g = ac.createGain();
  g.gain.setValueAtTime(0.28, t);
  g.gain.linearRampToValueAtTime(0.0, t + 0.28);
  src.connect(lp).connect(g).connect(ac.destination);
  src.start(t);
}
const soundBtn = document.getElementById('sound');
soundBtn.addEventListener('click', () => {
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? 'Sound on' : 'Sound off';
  soundBtn.setAttribute('aria-pressed', String(soundOn));
});

/* ============================================================
   Keyboard wiring — codes match node names 1:1
   ============================================================ */
window.addEventListener('keydown', (e) => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.repeat) { e.preventDefault(); return; }

  const handledKey = pressKey(e.code);

  if (e.key.length === 1) {
    e.preventDefault();
    typeChar(e.key);
    clack();
  } else if (e.code === 'Enter') {
    e.preventDefault();
    carriageReturnAction();
  } else if (e.code === 'Backspace') {
    e.preventDefault();
    backspaceAction();
    clack(0.3);
  } else if (handledKey && e.code === 'Tab') {
    e.preventDefault();
  }
});
window.addEventListener('keyup', (e) => releaseKey(e.code));

/* ============================================================
   Click / tap a 3D key to press it
   ============================================================ */
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let downAt = null;
canvas.addEventListener('pointerdown', (e) => { downAt = [e.clientX, e.clientY]; });
canvas.addEventListener('pointerup', (e) => {
  if (!downAt) return;
  const moved = Math.hypot(e.clientX - downAt[0], e.clientY - downAt[1]);
  downAt = null;
  if (moved > 6) return;
  pointer.set((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(scene.children, true);
  for (const hit of hits) {
    const m = hit.object.name.match(/^Key_([A-Za-z0-9]+?)(?:_part\d+)?$/);
    if (m) {
      const code = m[1];
      pressKey(code);
      setTimeout(() => releaseKey(code), 130);
      const map = { Space: ' ', Comma: ',', Period: '.', Slash: '/', Semicolon: ';', Quote: "'", Minus: '-', Equal: '=' };
      if (code === 'Backspace') { backspaceAction(); clack(0.3); }
      else if (/^Key([A-Z])$/.test(code)) { typeChar(code.slice(3).toLowerCase()); clack(); }
      else if (/^Digit(\d)$/.test(code)) { typeChar(code.slice(5)); clack(); }
      else if (map[code] !== undefined) { typeChar(map[code]); clack(); }
      break;
    }
  }
});
</script>
</body>
</html>
