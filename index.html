<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pink Typewriter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0508}
canvas{display:block}
#loader{position:fixed;inset:0;z-index:100;background:radial-gradient(ellipse at 50% 40%,#2a0a1c,#0a0508);
display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
transition:opacity .6s;font-family:monospace}
#loader.hide{opacity:0;pointer-events:none}
#lt{font-size:12px;letter-spacing:4px;color:#e090b0}
#lb{width:200px;height:2px;background:#3a1828;border-radius:1px;overflow:hidden}
#lp{height:100%;width:0;background:linear-gradient(90deg,#c8507a,#ff9ec4);transition:width .3s}
#hint{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);font-size:11px;
letter-spacing:3px;color:rgba(255,170,205,.55);z-index:10;pointer-events:none;font-family:monospace}
#mute{position:fixed;top:18px;right:18px;z-index:11;background:rgba(60,20,38,.6);
border:1px solid rgba(255,150,190,.25);color:#f0a0c0;font-family:monospace;font-size:11px;
padding:7px 12px;border-radius:6px;cursor:pointer}
</style>
</head>
<body>
<div id="loader"><div id="lt">LOADING</div><div id="lb"><div id="lp"></div></div></div>
<div id="hint">CLICK HERE THEN START TYPING</div>
<button id="mute">SOUND ON</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
const lp=document.getElementById("lp"),setP=p=>lp.style.width=p+"%";
window.addEventListener("load",()=>{
  if(!window.THREE){document.getElementById("lt").textContent="ERROR: no THREE";return;}
  setP(20);init();
});

function init(){
const T=THREE;

// ── Renderer ──────────────────────────────────────────────────────
const R=new T.WebGLRenderer({antialias:true});
R.setPixelRatio(Math.min(devicePixelRatio,2));
R.setSize(innerWidth,innerHeight);
R.shadowMap.enabled=true;R.shadowMap.type=T.PCFSoftShadowMap;
R.outputEncoding=T.sRGBEncoding;
R.toneMapping=T.ACESFilmicToneMapping;
R.toneMappingExposure=0.95;
document.body.appendChild(R.domElement);

const scene=new T.Scene();
scene.background=new T.Color(0x0a0508);

const cam=new T.PerspectiveCamera(45,innerWidth/innerHeight,.01,5000);
let camTarget=new T.Vector3();
addEventListener("resize",()=>{
  cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();
  R.setSize(innerWidth,innerHeight);
});

// ── Environment ───────────────────────────────────────────────────
const pmg=new T.PMREMGenerator(R);
const es=new T.Scene();
es.add(new T.Mesh(new T.SphereGeometry(50,24,12),new T.MeshBasicMaterial({color:0x141018,side:T.BackSide})));
[[-9,8,5,0xfff0f4,11,9],[9,4,4,0xf0f0ff,8,8],[0,13,0,0xffffff,14,12],[0,4,-10,0xffd8e8,12,7]].forEach(a=>{
  const m=new T.Mesh(new T.PlaneGeometry(a[4],a[5]),new T.MeshBasicMaterial({color:a[3]}));
  m.position.set(a[0],a[1],a[2]);m.lookAt(0,0,0);es.add(m);
});
const env=pmg.fromScene(es,.03).texture;scene.environment=env;pmg.dispose();

// ── Lights ────────────────────────────────────────────────────────
scene.add(new T.AmbientLight(0xffffff,0.25));
const kL=new T.DirectionalLight(0xfff2f6,3.0);kL.position.set(-6,9,6);
kL.castShadow=true;kL.shadow.mapSize.set(2048,2048);
kL.shadow.bias=-.0003;kL.shadow.normalBias=.02;scene.add(kL);
const fL=new T.DirectionalLight(0xdfe4ff,1.0);fL.position.set(7,4,4);scene.add(fL);
const rimL=new T.DirectionalLight(0xffd0e4,2.2);rimL.position.set(-2,5,-8);scene.add(rimL);

// ── Materials ─────────────────────────────────────────────────────
const MM=(c,rg,mt,ei=1.0)=>new T.MeshStandardMaterial(
  {color:new T.Color(c),roughness:rg,metalness:mt,envMap:env,envMapIntensity:ei});
function pinkMat(name){
  const n=(name||"").toLowerCase();
  if(n.includes("chrome"))   return MM(0xeae4ea,.08,1.0,1.4);
  if(n.includes("rubber"))   return MM(0x160810,.85,.1,.15);
  if(n.includes("tape"))     return MM(0x140510,.9,.0,.05);
  if(n.includes("button"))   return MM(0xf2eade,.3,.05,.5);
  if(n.includes("black"))    return MM(0x38101f,.4,.6,.9);
  if(n.includes("measure"))  return MM(0xc06f8c,.32,.5,1.0);
  if(n.includes("paper"))    return MM(0xf4e4ec,.9,.0,.15);
  if(n.includes("label"))    return MM(0xd8a850,.22,.85,1.4);
  return MM(0xd8467e,.22,.5,0.9);
}

// ── Paper canvas ──────────────────────────────────────────────────
const PW=1024,PH=1400;
const pcan=document.createElement("canvas");pcan.width=PW;pcan.height=PH;
const pctx=pcan.getContext("2d");
const COLS=44,ROWS=32,MX=90,MY=70,LH=40,FS=28;
const CW=(PW-MX*2)/COLS;
let lines=[[]],curRow=0,curCol=0,scrollLines=0,caps=false;
const ptex=new T.CanvasTexture(pcan);
ptex.encoding=T.sRGBEncoding;
ptex.anisotropy=R.capabilities.getMaxAnisotropy();

// FIX: draw paper only when content changes, not every frame
// Store rendered chars separately so ink offsets are stable
let charOffsets={}; // key="r,c" value={ox,oy,ink}
function getOffset(r,c){
  const k=`${r},${c}`;
  if(!charOffsets[k]) charOffsets[k]={
    ox:(Math.random()-.5)*1.4,
    oy:(Math.random()-.5)*1.4,
    ink:0.74+Math.random()*0.18
  };
  return charOffsets[k];
}

let paperDirty=true; // only redraw when needed
let cursorVisible=true;

function drawPaper(){
  const g=pctx.createLinearGradient(0,0,0,PH);
  g.addColorStop(0,"#fdf8ee");g.addColorStop(1,"#f2ead4");
  pctx.fillStyle=g;pctx.fillRect(0,0,PW,PH);
  pctx.strokeStyle="rgba(190,70,60,0.22)";pctx.lineWidth=2;
  pctx.beginPath();pctx.moveTo(MX-16,40);pctx.lineTo(MX-16,PH-40);pctx.stroke();
  pctx.font=`${FS}px 'Courier New',monospace`;pctx.textBaseline="top";
  for(let r=0;r<lines.length;r++){
    const sr=r-scrollLines;if(sr<0||sr>=ROWS)continue;
    const line=lines[r],y=MY+sr*LH;
    for(let c=0;c<line.length;c++){
      const ch=line[c];if(!ch||ch===" ")continue;
      const {ox,oy,ink}=getOffset(r,c);
      pctx.fillStyle=`rgba(28,20,30,${ink})`;
      pctx.fillText(ch,MX+c*CW+ox,y+oy);
    }
  }
  // cursor
  const sr=curRow-scrollLines;
  if(cursorVisible&&sr>=0&&sr<ROWS){
    pctx.fillStyle="rgba(40,30,40,0.7)";
    pctx.fillRect(MX+curCol*CW,MY+sr*LH+LH-4,CW*0.8,3);
  }
  ptex.needsUpdate=true;
  paperDirty=false;
}

let paperMesh,paperGrp;
function buildPaper(modelBox,modelScale){
  // Place paper so it sits inside the platen — only top portion visible
  const s=modelBox.getSize(new T.Vector3());
  const c=modelBox.getCenter(new T.Vector3());
  const pw=s.x*0.52, ph=pw*(PH/PW);
  const geo=new T.PlaneGeometry(pw,ph);
  const mat=new T.MeshStandardMaterial({
    map:ptex,roughness:.9,metalness:0,
    envMap:env,envMapIntensity:.15,side:T.DoubleSide
  });
  paperMesh=new T.Mesh(geo,mat);
  paperGrp=new T.Group();paperGrp.add(paperMesh);
  // Paper center at model top - ph*0.1 so bottom 60% is inside platen
  paperGrp.position.set(c.x, modelBox.max.y - ph*0.12, c.z+s.z*0.08);
  paperGrp.rotation.x=-0.12;
  paperGrp.userData.baseX=c.x;
  scene.add(paperGrp);
  drawPaper();
}

// ── Sounds ────────────────────────────────────────────────────────
let AC=null,muted=false;
const ac=()=>{if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;};
function sndKey(){if(muted)return;const c=ac(),t=c.currentTime;
  const o=c.createOscillator(),g=c.createGain();
  o.type="square";o.frequency.value=1500+Math.random()*400;
  g.gain.setValueAtTime(.05,t);g.gain.exponentialRampToValueAtTime(.001,t+.04);
  o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.05);}
function sndBell(){if(muted)return;const c=ac(),t=c.currentTime;
  [1660,2490].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();
    o.frequency.value=f;o.type="sine";
    g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(.12/(i+1),t+.005);
    g.gain.exponentialRampToValueAtTime(.0001,t+1);
    o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+1.1);});}
function sndReturn(){if(muted)return;const c=ac(),t=c.currentTime;
  for(let i=0;i<9;i++){const tt=t+i*.03,o=c.createOscillator(),g=c.createGain();
    o.type="square";o.frequency.value=900+Math.random()*300;
    g.gain.setValueAtTime(.04,tt);g.gain.exponentialRampToValueAtTime(.001,tt+.02);
    o.connect(g);g.connect(c.destination);o.start(tt);o.stop(tt+.03);}}
document.getElementById("mute").onclick=e=>{
  muted=!muted;e.target.textContent=muted?"SOUND OFF":"SOUND ON";e.target.blur();};

// ── Typing logic ──────────────────────────────────────────────────
let paperVib=0;
const hint=document.getElementById("hint");let hintGone=false;
function typeCh(ch){
  if(!lines[curRow])lines[curRow]=[];
  lines[curRow][curCol]=ch;
  curCol++;
  if(curCol===COLS-5)sndBell();
  if(curCol>=COLS)newline();
  paperDirty=true;
}
function newline(){
  curRow++;curCol=0;
  if(!lines[curRow])lines[curRow]=[];
  if(curRow-scrollLines>=ROWS-3)scrollLines++;
  sndReturn();paperVib=0.4;paperDirty=true;
}
function backspace(){
  if(curCol>0){
    curCol--;
    delete charOffsets[`${curRow},${curCol}`]; // remove stored offset
    if(lines[curRow])lines[curRow][curCol]=null;
  } else if(curRow>0){
    curRow--;curCol=(lines[curRow]||[]).length;
  }
  paperDirty=true;
}


// ── Key animation ─────────────────────────────────────────────────
// keyMap: code → array of ALL mesh parts belonging to that key
// Parts are siblings in GLB (same parent Neri), each is a separate mesh
// Press direction: local -Z (confirmed: combined quaternion chain = local-Z = world-down)
// Scale: 0.023 → 6.5 local units ≈ 0.15 world units of travel
const keyMap = {}; // code → [obj, obj, ...]  (all parts)
let keysReady = false;
const PRESS_DIST = -6.5; // local Z units

function pressKey(code){
  if(!keysReady) return;
  const parts = keyMap[code];
  if(!parts) return;
  parts.forEach(obj=>{
    if(obj.userData.origZ === undefined) obj.userData.origZ = obj.position.z;
    obj.position.z = obj.userData.origZ + PRESS_DIST;
  });
}

function releaseKey(code){
  const parts = keyMap[code];
  if(!parts) return;
  const startZs  = parts.map(o => o.position.z);
  const targetZs = parts.map(o => o.userData.origZ ?? o.position.z);
  const t0 = performance.now();
  (function spring(now){
    const p = Math.min((now-t0)/140, 1);
    const ease = p>=1 ? 1 : 1-Math.pow(2,-10*p)*Math.cos((p*10-.75)*(Math.PI*2/3));
    parts.forEach((obj,i)=>{
      obj.position.z = startZs[i] + (targetZs[i]-startZs[i]) * ease;
    });
    if(p < 1) requestAnimationFrame(spring);
    else parts.forEach((obj,i) => obj.position.z = targetZs[i]);
  })(performance.now());
}

// ── Keyboard events ───────────────────────────────────────────────
addEventListener("keydown",e=>{
  if(AC&&AC.state==="suspended")AC.resume();
  if(!hintGone){hint.style.display="none";hintGone=true;}
  if(e.metaKey||e.ctrlKey||e.altKey) return;
  pressKey(e.code);
  const k=e.key;
  if(k==="Backspace"){e.preventDefault();sndKey();backspace();paperVib=0.25;return;}
  if(k==="Enter"){e.preventDefault();newline();return;}
  if(k==="CapsLock"){caps=!caps;return;}
  if(k==="Shift"||k==="Tab"||k==="Escape"||k.startsWith("Arrow")||
     k==="Control"||k==="Alt"||k==="Meta"){if(k==="Tab")e.preventDefault();return;}
  if(k===" "){e.preventDefault();sndKey();paperVib=0.15;
    setTimeout(()=>{typeCh(" ");},30);return;}
  if(k.length===1){e.preventDefault();sndKey();
    let c=k;
    if(caps&&/[a-z]/.test(c))c=c.toUpperCase();
    else if(caps&&/[A-Z]/.test(c)&&!e.shiftKey)c=c.toLowerCase();
    paperVib=0.2;
    setTimeout(()=>{typeCh(c);},50);}
});
addEventListener("keyup",e=>releaseKey(e.code));

// ── Load model ────────────────────────────────────────────────────
new T.GLTFLoader().load("typewriter_rigged.glb",g=>{
  setP(90);
  const m=g.scene;

  // Apply materials
  m.traverse(ch=>{
    if(!ch.isMesh) return;
    ch.castShadow=ch.receiveShadow=true;
    const arr=Array.isArray(ch.material)?ch.material:[ch.material];
    ch.material=arr.map(o=>{
      const nm=pinkMat(o&&o.name);nm.map=null;
      if(o&&o.normalMap){nm.normalMap=o.normalMap;nm.normalScale.set(.6,.6);}
      return nm;
    });
    if(ch.material.length===1)ch.material=ch.material[0];
  });

  // Scale and center
  const box0=new T.Box3().setFromObject(m);
  const c0=box0.getCenter(new T.Vector3());
  const s0=box0.getSize(new T.Vector3());
  const scl=4/Math.max(s0.x,s0.y,s0.z);
  m.scale.setScalar(scl);
  m.position.set(-c0.x*scl,-c0.y*scl,-c0.z*scl);
  scene.add(m);

  // CRITICAL: update matrices BEFORE mapping keys so matrixWorld is valid
  m.updateMatrixWorld(true);

  // Map key nodes — collect ALL parts (primary + part1 + part2) per key code
  // Parts are siblings (same parent Neri), so we animate all of them together
  const keyParts = {}; // code → [obj, obj, obj]
  m.traverse(ch=>{
    const nn = ch.name || '';
    if(!nn.startsWith('Key_')) return;
    // Extract base code — strip _part suffix and _mesh suffix
    let base = nn.replace(/_part\d+$/,'').replace(/_mesh$/,'');
    const code = base.replace('Key_','');
    // Skip Extra keys and non-key nodes
    if(code.includes('Extra') || code.includes('Space 1')) return;
    // Handle duplicate Space (Three.js renames second to 'Key_Space 1')
    const cleanCode = code.trim();
    if(!keyParts[cleanCode]) keyParts[cleanCode]=[];
    keyParts[cleanCode].push(ch);
  });

  // Build keyMap: code → array of all objects to animate
  Object.entries(keyParts).forEach(([code, objs])=>{
    keyMap[code] = objs;
    // Store origPos for each part
    objs.forEach(obj=>{
      obj.userData.origZ = obj.position.z;
    });
  });
  keysReady=true;
  console.log('Keys ready:',Object.keys(keyMap).length, Object.keys(keyMap).sort().join(' '));

  // World bounds for camera and paper
  const box=new T.Box3().setFromObject(m);
  const c=box.getCenter(new T.Vector3());
  const s=box.getSize(new T.Vector3());

  // Shadow floor
  const sf=new T.Mesh(new T.PlaneGeometry(s.x*4,s.z*4),new T.ShadowMaterial({opacity:.5}));
  sf.rotation.x=-Math.PI/2;sf.position.y=box.min.y;sf.receiveShadow=true;scene.add(sf);

  // Camera
  const maxDim=Math.max(s.x,s.y,s.z);
  const dist=maxDim*1.9;
  cam.position.set(c.x,c.y+maxDim*0.35,c.z+dist);
  camTarget.copy(c);
  cam.lookAt(camTarget);

  // Paper
  buildPaper(box,scl);

  setP(100);
  setTimeout(()=>document.getElementById("loader").classList.add("hide"),400);
},
xhr=>{if(xhr.total)setP(20+xhr.loaded/xhr.total*70);},
err=>{console.error(err);document.getElementById("lt").textContent="ERROR: "+err.message;});

// ── Render loop ───────────────────────────────────────────────────
let paperVibX=0;
let cursorTimer=0;
let t0=performance.now();
(function loop(now){
  requestAnimationFrame(loop);
  const dt=Math.min((now-t0)/1000,.05);t0=now;

  // Paper vibration decay
  if(paperVib>0){paperVib*=0.82;if(paperVib<0.001)paperVib=0;}
  if(paperGrp&&paperVib>0){
    paperGrp.position.x=paperGrp.userData.baseX+(Math.random()-.5)*paperVib*0.04;
  }

  // Cursor blink — redraw paper only when cursor state changes
  cursorTimer+=dt;
  const newCursorVisible=Math.floor(cursorTimer/0.5)%2===0;
  if(newCursorVisible!==cursorVisible){
    cursorVisible=newCursorVisible;
    paperDirty=true;
  }

  // Only redraw paper when content actually changed
  if(paperDirty) drawPaper();

  R.render(scene,cam);
})(performance.now());
}
</script>
</body>
</html>
