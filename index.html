<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Royal Typewriter — Type Something Real</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Cormorant+Garamond:ital,wght@0,500;1,500&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #1c1a17;
    --paper: #f5f0e4;
    --room: #23262b;
    --brass: #a8874f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--room);
    font-family: 'Special Elite', 'Courier New', monospace;
    color: var(--paper);
  }
  #scene { position: fixed; inset: 0; display: block; }

  /* ---------- Loading ---------- */
  #loader {
    position: fixed; inset: 0; z-index: 30;
    background: var(--room);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px; transition: opacity .6s ease;
  }
  #loader.hidden { opacity: 0; pointer-events: none; }
  #loader .word { font-size: clamp(20px, 3.4vw, 34px); letter-spacing: .14em; }
  #loader .word .caret {
    display: inline-block; width: .55em; height: 1.05em;
    background: var(--paper); vertical-align: -0.15em;
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  #loader .pct { font-size: 12px; letter-spacing: .3em; color: var(--brass); }

  /* ---------- Chrome ---------- */
  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 20px 28px; pointer-events: none;
  }
  header h1 {
    font-size: 15px; font-weight: 400; letter-spacing: .32em;
    text-transform: uppercase; opacity: .85;
  }
  header .hint {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 15px; opacity: .55;
  }
  #hud {
    position: fixed; left: 28px; bottom: 22px; z-index: 10;
    display: flex; flex-direction: column; gap: 8px;
    font-size: 11px; letter-spacing: .22em;
  }
  #hud .row { display: flex; gap: 22px; align-items: center; }
  #counter { opacity: .6; }
  #hud button {
    all: unset; cursor: pointer; letter-spacing: .22em;
    font-family: inherit; font-size: 11px; opacity: .7; padding: 3px 0;
  }
  #hud button:hover, #hud button:focus-visible { color: var(--brass); opacity: 1; }
  #orbit-hint { opacity: .4; pointer-events: none; }

  #note {
    position: fixed; left: 50%; transform: translateX(-50%);
    bottom: 28px; z-index: 10;
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 16px; opacity: 0; transition: opacity .5s ease;
    pointer-events: none;
  }
  #note.show { opacity: .75; }

  /* ---------- Finished pages stack ---------- */
  #stack {
    position: fixed; right: 26px; top: 72px; z-index: 10;
    width: min(250px, 26vw);
    pointer-events: none;
    perspective: 800px;
  }
  #stack .sheet {
    position: absolute; top: 0; right: 0;
    width: 100%;
    border-radius: 2px;
    box-shadow: 0 14px 34px rgba(0,0,0,.55), 0 2px 6px rgba(0,0,0,.35);
    transition: transform .7s cubic-bezier(.22,1,.36,1), opacity .7s ease;
    transform-origin: 50% 20%;
  }
  #stack .sheet.enter {
    transform: translate(20vw, 30vh) rotate(14deg) scale(.4);
    opacity: 0;
  }
  #stack-label {
    position: fixed; right: 28px; top: 52px; z-index: 10;
    font-size: 10px; letter-spacing: .28em; opacity: 0; transition: opacity .6s;
  }
  #stack-label.show { opacity: .55; }

  @media (max-width: 720px) {
    header { padding: 14px 16px; }
    header .hint { display: none; }
    #orbit-hint { display: none; }
    #stack { width: 34vw; top: 56px; right: 12px; }
  }
  @media (prefers-reduced-motion: reduce) {
    #loader .word .caret { animation: none; }
    #stack .sheet { transition: none; }
  }
</style>
</head>
<body>

<div id="loader" role="status" aria-live="polite">
  <div class="word">ROYAL<span class="caret"></span></div>
  <div class="pct" id="loader-pct">LOADING 0%</div>
</div>

<header>
  <h1>Royal Typewriter</h1>
  <span class="hint">Just start typing — it lands on the page.</span>
</header>

<canvas id="scene" aria-label="3D vintage Royal typewriter. Type on your keyboard and the text appears on the paper. Full pages eject and stack on screen."></canvas>

<span id="stack-label">FINISHED PAGES</span>
<div id="stack" aria-live="polite"></div>

<div id="hud">
  <div class="row">
    <span id="counter">PAGE 1 · LINE 1 · COL 0</span>
    <button id="newsheet" type="button">Pull sheet</button>
    <button id="sound" type="button" aria-pressed="true">Sound on</button>
  </div>
  <span id="orbit-hint">DRAG TO ORBIT · SCROLL TO ZOOM</span>
</div>

<div id="note"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ============================================================
   Scene
   ============================================================ */
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x23262b);
scene.fog = new THREE.Fog(0x23262b, 60, 160);

const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 500);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.enablePan = false;
controls.minPolarAngle = 0.5;
controls.maxPolarAngle = 1.42;

scene.add(new THREE.AmbientLight(0xbfc4cc, 0.55));
const keyLight = new THREE.DirectionalLight(0xfff1dd, 2.4);
keyLight.position.set(18, 30, 22);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
scene.add(keyLight);
const fill = new THREE.DirectionalLight(0x9fb4d8, 0.7);
fill.position.set(-24, 14, -10);
scene.add(fill);
const rim = new THREE.DirectionalLight(0xffffff, 0.6);
rim.position.set(0, 18, -28);
scene.add(rim);

/* ============================================================
   Paper typesetting constants (from the paper mesh UV↔world fit)
   ============================================================ */
const TEXW = 512, TEXH = 1280;   // canvas covers the extended (taller) sheet
const LINE_PX = 30.509;          // one carriage-return step
const STRIKE_ROW = 407.50;       // fixed strike line at the platen
const BASE_H = 679.16;           // height of one full page image on the canvas
const EDGE_MARGIN = 4.5;         // blank lines between the page's top edge and line 1
const EDGE0 = STRIKE_ROW + EDGE_MARGIN * LINE_PX;  // fresh page stands clear of the platen
const PAGE_LINES = 18;           // the page feeds nearly its full height before
                                 // ejecting, so all three punch holes rise into view
const COL0_PX = 96;
const CHAR_PX = 10;
const MAX_COL = 38;
const BELL_COL = 33;
const FEED_VEC = new THREE.Vector3(0.0033, 1.0157, 0.4244); // world per line step (used by eject)
const EJECT_STEPS = 9;           // how far the sheet flies when ejected

/* ============================================================
   Model + paper texture
   ============================================================ */
const keyGroups = {};
const restPositions = new Map();
const activePresses = new Map();
let pressAxis = new THREE.Vector3(0, 0, -1);
let pressDepth = 0.32;

let paperMesh = null, paperHome = null, paperBase = null;
let paperCanvas = null, pctx = null, lineCanvas = null, lctx = null;
let paperTexture = null;

const loaderEl = document.getElementById('loader');
const pctEl = document.getElementById('loader-pct');

new GLTFLoader().load(
  'typewriter_rigged_clean.glb?v=6',
  (gltf) => {
    const model = gltf.scene;
    model.traverse((obj) => {
      if (obj.isMesh) { obj.castShadow = true; obj.receiveShadow = true; }
      const m = obj.name.match(/^Key_([A-Za-z0-9]+?)(?:_part\d+)?$/);
      if (m) {
        (keyGroups[m[1]] ??= []).push(obj);
        restPositions.set(obj, obj.position.clone());
      }
      if (obj.isMesh && /Paper/.test(obj.name)) paperMesh = obj;
    });
    scene.add(model);

    if (paperMesh) {
      paperHome = paperMesh.position.clone();
      paperBase = paperMesh.material.map.image;
      paperCanvas = document.createElement('canvas');
      paperCanvas.width = TEXW; paperCanvas.height = TEXH;
      pctx = paperCanvas.getContext('2d');
      lineCanvas = document.createElement('canvas');
      lineCanvas.width = TEXW; lineCanvas.height = Math.ceil(LINE_PX) + 8;
      lctx = lineCanvas.getContext('2d');

      paperTexture = new THREE.CanvasTexture(paperCanvas);
      paperTexture.flipY = false;
      paperTexture.colorSpace = THREE.SRGBColorSpace;
      paperTexture.anisotropy = renderer.capabilities.getMaxAnisotropy();
      paperMesh.material.map = paperTexture;
      paperMesh.material.transparent = true;
      redrawPaper();
    }

    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const radius = Math.max(size.x, size.y, size.z);
    controls.target.copy(center);
    camera.position.set(center.x - radius * 0.55, center.y + radius * 0.62, center.z + radius * 1.0);
    camera.near = radius / 100;
    camera.far = radius * 20;
    camera.updateProjectionMatrix();
    controls.minDistance = radius * 0.55;
    controls.maxDistance = radius * 2.4;
    controls.update();

    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(radius * 2.2, 48),
      new THREE.ShadowMaterial({ opacity: 0.35 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = box.min.y + 0.001;
    ground.receiveShadow = true;
    scene.add(ground);

    const sample = keyGroups['KeyA']?.[0];
    if (sample && sample.parent) {
      sample.parent.updateWorldMatrix(true, false);
      const q = sample.parent.getWorldQuaternion(new THREE.Quaternion()).invert();
      pressAxis.set(0, -1, 0).applyQuaternion(q).normalize();
    }

    loaderEl.classList.add('hidden');
  },
  (xhr) => {
    if (xhr.total) pctEl.textContent = `LOADING ${Math.round((xhr.loaded / xhr.total) * 100)}%`;
  },
  (err) => {
    pctEl.textContent = 'COULD NOT LOAD THE TYPEWRITER MODEL';
    console.error(err);
  }
);

/* ============================================================
   Page state — real-typewriter rules
   (backspace steps back without erasing; overtype allowed)
   ============================================================ */
let lines = [[]];
let col = 0;
let lineIndex = 0;
let pageNumber = 1;
let ejecting = false;
const typeQueue = [];   // input buffered during the eject animation

const counter = document.getElementById('counter');
const note = document.getElementById('note');
let noteTimer = null;

function updateCounter() {
  counter.textContent = `PAGE ${pageNumber} · LINE ${lineIndex + 1} · COL ${col}`;
}
function flashNote(text) {
  note.textContent = text;
  note.classList.add('show');
  clearTimeout(noteTimer);
  noteTimer = setTimeout(() => note.classList.remove('show'), 1700);
}

/* ---------- drawing onto the 3D paper ---------- */
function drawLineFlipped(stamps, rowCenter) {
  lctx.clearRect(0, 0, lineCanvas.width, lineCanvas.height);
  lctx.font = `17px 'Special Elite', 'Courier New', monospace`;
  lctx.textBaseline = 'middle';
  for (const s of stamps) {
    lctx.fillStyle = `rgba(28, 26, 33, ${s.ink})`;
    lctx.save();
    lctx.translate(COL0_PX + s.col * CHAR_PX + s.dx, lineCanvas.height / 2 + s.dy);
    lctx.rotate(s.rot);
    lctx.fillText(s.ch, 0, 0);
    lctx.restore();
  }
  pctx.save();
  pctx.translate(0, rowCenter + lineCanvas.height / 2);
  pctx.scale(1, -1);
  pctx.drawImage(lineCanvas, 0, 0);
  pctx.restore();
}

function redrawPaper() {
  if (!pctx) return;
  // The page's visible top edge is painted: everything above it is
  // transparent, so as the edge row climbs, the sheet truly rises out
  // of the platen — edge, ruling, holes and text all together.
  const pageTop = EDGE0 + lineIndex * LINE_PX;
  pctx.clearRect(0, 0, TEXW, TEXH);
  pctx.drawImage(paperBase, 0, pageTop - BASE_H, TEXW, BASE_H);

  for (let i = 0; i < lines.length; i++) {
    if (!lines[i].length) continue;
    const row = STRIKE_ROW + (lineIndex - i) * LINE_PX;
    if (row < -LINE_PX || row > TEXH + LINE_PX) continue;
    drawLineFlipped(lines[i], row);
  }
  paperTexture.needsUpdate = true;
}

/* ---------- typing actions ---------- */
function typeChar(ch) {
  if (ejecting) { typeQueue.push({ t: 'char', ch }); return; }
  if (col >= MAX_COL) {
    carriageReturnAction();
    if (ejecting) { typeQueue.push({ t: 'char', ch }); return; }
  }
  const r = () => (Math.random() - 0.5);
  lines[lineIndex].push({
    col, ch,
    dx: r() * 1.6, dy: r() * 1.4, rot: r() * 0.05,
    ink: 0.62 + Math.random() * 0.3,
  });
  col++;
  if (col === BELL_COL) { ding(); flashNote('ding — near the margin'); }
  updateCounter();
  redrawPaper();
}
function carriageReturnAction() {
  if (ejecting) { typeQueue.push({ t: 'return' }); return; }
  if (lineIndex + 1 >= PAGE_LINES) { ejectPage(); return; }
  lines.push([]);
  lineIndex++;
  col = 0;
  carriageReturn();
  updateCounter();
  redrawPaper();
}
function backspaceAction() {
  if (ejecting) return;
  if (col > 0) col--;   // the ink stays — overtype to correct
  updateCounter();
}
document.getElementById('newsheet').addEventListener('click', () => {
  if (!ejecting) ejectPage();
});

/* ============================================================
   Page eject → on-screen stack → fresh sheet
   ============================================================ */
const stackEl = document.getElementById('stack');
const stackLabel = document.getElementById('stack-label');
let ejectAnim = null;   // { t, phase }

function renderFinishedPage() {
  // A full, upright rendering of the sheet for the on-screen pile.
  const c = document.createElement('canvas');
  c.width = TEXW; c.height = Math.round(BASE_H);
  const g = c.getContext('2d');
  g.drawImage(paperBase, 0, 0, TEXW, BASE_H);
  g.font = `17px 'Special Elite', 'Courier New', monospace`;
  g.textBaseline = 'middle';
  const top = EDGE_MARGIN * LINE_PX;
  for (let i = 0; i < lines.length; i++) {
    for (const s of lines[i]) {
      g.fillStyle = `rgba(28, 26, 33, ${s.ink})`;
      g.save();
      g.translate(COL0_PX + s.col * CHAR_PX + s.dx, top + i * LINE_PX + s.dy);
      g.rotate(s.rot);
      g.fillText(s.ch, 0, 0);
      g.restore();
    }
  }
  return c.toDataURL('image/jpeg', 0.85);
}

function addToStack(dataUrl) {
  const img = document.createElement('img');
  img.className = 'sheet enter';
  img.src = dataUrl;
  img.alt = `Finished page ${pageNumber}`;
  stackEl.appendChild(img);
  stackLabel.classList.add('show');

  // Restyle the pile: newest in front, older sheets tucked behind it.
  const sheets = [...stackEl.children];
  while (sheets.length > 6) { sheets.shift().remove(); }
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const n = stackEl.children.length;
    [...stackEl.children].forEach((el, i) => {
      const depth = n - 1 - i;            // 0 = newest
      el.classList.remove('enter');
      el.style.zIndex = String(100 - depth);
      el.style.transform =
        `translate(${-depth * 9}px, ${-depth * 7}px) rotate(${depth % 2 ? -2.4 : 1.8}deg) scale(${1 - depth * 0.045})`;
      el.style.opacity = String(Math.max(0.35, 1 - depth * 0.16));
    });
  }));
}

function ejectPage() {
  if (!paperMesh) return;
  const hasInk = lines.some(l => l.length);
  ejecting = true;
  const snapshot = hasInk ? renderFinishedPage() : null;
  ejectAnim = { t: 0, phase: 'out', snapshot };
  ratchetZip();
  flashNote(hasInk ? `page ${pageNumber} — out of the machine` : 'fresh sheet');
}

function finishEjectSwap() {
  if (ejectAnim.snapshot) {
    addToStack(ejectAnim.snapshot);
    pageNumber++;
  }
  lines = [[]];
  lineIndex = 0;
  col = 0;
  redrawPaper();   // clean sheet texture
  updateCounter();
}

function stepEject(dt) {
  if (!ejectAnim) return;
  ejectAnim.t += dt;
  const A = ejectAnim;
  if (A.phase === 'out') {
    // sheet zips up and out of the platen, fading at the end
    const k = Math.min(A.t / 0.65, 1);
    const e = 1 - Math.pow(1 - k, 3);
    paperMesh.position.copy(paperHome).addScaledVector(FEED_VEC, e * EJECT_STEPS);
    paperMesh.material.opacity = 1 - Math.max(0, (k - 0.7) / 0.3);
    if (k === 1) {
      finishEjectSwap();
      A.phase = 'in';
      A.t = 0;
      thunk();
    }
  } else if (A.phase === 'in') {
    // fresh sheet rolls down into place from just above
    const k = Math.min(A.t / 0.45, 1);
    const e = 1 - Math.pow(1 - k, 2);
    paperMesh.position.copy(paperHome).addScaledVector(FEED_VEC, (1 - e) * 2.2);
    paperMesh.material.opacity = Math.min(1, k * 2.5);
    if (k === 1) {
      paperMesh.position.copy(paperHome);
      paperMesh.material.opacity = 1;
      ejectAnim = null;
      ejecting = false;
      // flush anything typed during the animation
      while (typeQueue.length) {
        const q = typeQueue.shift();
        if (q.t === 'char') { typeChar(q.ch); clack(0.35); }
        else carriageReturnAction();
      }
    }
  }
}

/* ============================================================
   Key press animation
   ============================================================ */
function pressKey(code) {
  if (code === 'Digit1') code = 'KeyL';   // Royals have no 1 — typists used L
  const parts = keyGroups[code];
  if (!parts) return false;
  activePresses.set(code, { phase: 'down', t: 0 });
  return true;
}
function releaseKey(code) {
  if (code === 'Digit1') code = 'KeyL';
  const st = activePresses.get(code);
  if (st) st.phase = 'up';
}

const clock = new THREE.Clock();
function animate() {
  const dt = Math.min(clock.getDelta(), 0.05);
  for (const [code, st] of activePresses) {
    const speed = st.phase === 'down' ? 14 : 8;
    st.t += (st.phase === 'down' ? 1 : -1) * speed * dt;
    st.t = Math.max(0, Math.min(1, st.t));
    const ease = st.t * (2 - st.t);
    for (const obj of keyGroups[code]) {
      const rest = restPositions.get(obj);
      obj.position.copy(rest).addScaledVector(pressAxis, ease * pressDepth);
    }
    if (st.phase === 'up' && st.t === 0) activePresses.delete(code);
  }
  stepEject(dt);
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ============================================================
   Sound — synthesized, no assets
   ============================================================ */
let audioCtx = null;
let soundOn = true;
function ctx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function clack(vol = 0.55) {
  if (!soundOn) return;
  const ac = ctx(), t = ac.currentTime;
  const buf = ac.createBuffer(1, ac.sampleRate * 0.05, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2.4);
  const src = ac.createBufferSource(); src.buffer = buf;
  const bp = ac.createBiquadFilter(); bp.type = 'bandpass';
  bp.frequency.value = 2200 + Math.random() * 900; bp.Q.value = 1.1;
  const g = ac.createGain();
  g.gain.setValueAtTime(vol + Math.random() * 0.15, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
  src.connect(bp).connect(g).connect(ac.destination);
  src.start(t);
}
function ding() {
  if (!soundOn) return;
  const ac = ctx(), t = ac.currentTime;
  const o = ac.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(2093, t);
  const g = ac.createGain();
  g.gain.setValueAtTime(0.25, t);
  g.gain.exponentialRampToValueAtTime(0.0005, t + 0.9);
  o.connect(g).connect(ac.destination);
  o.start(t); o.stop(t + 0.95);
}
function carriageReturn() {
  if (!soundOn) return;
  const ac = ctx(), t = ac.currentTime;
  const buf = ac.createBuffer(1, ac.sampleRate * 0.28, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.4 * (1 - i / d.length);
  const src = ac.createBufferSource(); src.buffer = buf;
  const lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 900;
  const g = ac.createGain();
  g.gain.setValueAtTime(0.28, t);
  g.gain.linearRampToValueAtTime(0.0, t + 0.28);
  src.connect(lp).connect(g).connect(ac.destination);
  src.start(t);
}
function ratchetZip() {
  if (!soundOn) return;
  const ac = ctx();
  for (let i = 0; i < 9; i++) {
    setTimeout(() => clack(0.22), i * 45);
  }
}
function thunk() {
  if (!soundOn) return;
  const ac = ctx(), t = ac.currentTime;
  const o = ac.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(140, t);
  o.frequency.exponentialRampToValueAtTime(60, t + 0.12);
  const g = ac.createGain();
  g.gain.setValueAtTime(0.4, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.16);
  o.connect(g).connect(ac.destination);
  o.start(t); o.stop(t + 0.18);
}
const soundBtn = document.getElementById('sound');
soundBtn.addEventListener('click', () => {
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? 'Sound on' : 'Sound off';
  soundBtn.setAttribute('aria-pressed', String(soundOn));
});

/* ============================================================
   Keyboard wiring — codes match node names 1:1
   ============================================================ */
window.addEventListener('keydown', (e) => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.repeat) { e.preventDefault(); return; }

  const handledKey = pressKey(e.code);

  if (e.key.length === 1) {
    e.preventDefault();
    typeChar(e.key);
    clack();
  } else if (e.code === 'Enter') {
    e.preventDefault();
    carriageReturnAction();
  } else if (e.code === 'Backspace') {
    e.preventDefault();
    backspaceAction();
    clack(0.3);
  } else if (handledKey && e.code === 'Tab') {
    e.preventDefault();
  }
});
window.addEventListener('keyup', (e) => releaseKey(e.code));

/* ============================================================
   Click / tap a 3D key to press it
   ============================================================ */
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let downAt = null;
canvas.addEventListener('pointerdown', (e) => { downAt = [e.clientX, e.clientY]; });
canvas.addEventListener('pointerup', (e) => {
  if (!downAt) return;
  const moved = Math.hypot(e.clientX - downAt[0], e.clientY - downAt[1]);
  downAt = null;
  if (moved > 6) return;
  pointer.set((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(scene.children, true);
  for (const hit of hits) {
    const m = hit.object.name.match(/^Key_([A-Za-z0-9]+?)(?:_part\d+)?$/);
    if (m) {
      const code = m[1];
      pressKey(code);
      setTimeout(() => releaseKey(code), 130);
      const map = { Space: ' ', Comma: ',', Period: '.', Slash: '/', Semicolon: ';', Quote: "'", Minus: '-', Equal: '=' };
      if (code === 'Backspace') { backspaceAction(); clack(0.3); }
      else if (/^Key([A-Z])$/.test(code)) { typeChar(code.slice(3).toLowerCase()); clack(); }
      else if (/^Digit(\d)$/.test(code)) { typeChar(code.slice(5)); clack(); }
      else if (map[code] !== undefined) { typeChar(map[code]); clack(); }
      break;
    }
  }
});
</script>
