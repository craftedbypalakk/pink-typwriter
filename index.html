<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Typewriter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#111}
canvas{display:block}
#loader{position:fixed;inset:0;z-index:100;background:#111;
display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
transition:opacity .6s;font-family:monospace}
#loader.hide{opacity:0;pointer-events:none}
#lt{font-size:12px;letter-spacing:4px;color:#888}
#lb{width:200px;height:2px;background:#333;border-radius:1px;overflow:hidden}
#lp{height:100%;width:0;background:#aaa;transition:width .3s}
</style>
</head>
<body>
<div id="loader">
<div id="lt">LOADING</div>
<div id="lb"><div id="lp"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
const lp=document.getElementById("lp");
const setP=p=>lp.style.width=p+"%";

window.addEventListener("load",()=>{
  if(!window.THREE){document.getElementById("lt").textContent="ERROR";return;}
  setP(20);init();
});

function init(){
  const T=THREE;

  const R=new T.WebGLRenderer({antialias:true});
  R.setPixelRatio(Math.min(devicePixelRatio,2));
  R.setSize(innerWidth,innerHeight);
  R.shadowMap.enabled=true;
  R.shadowMap.type=T.PCFSoftShadowMap;
  R.outputEncoding=T.sRGBEncoding;
  R.toneMapping=T.ACESFilmicToneMapping;
  R.toneMappingExposure=1.1;
  document.body.appendChild(R.domElement);

  const scene=new T.Scene();
  scene.background=new T.Color(0x1a1a1a);

  const cam=new T.PerspectiveCamera(45,innerWidth/innerHeight,.01,1000);
  cam.position.set(0,2,6);

  const ctrl=new T.OrbitControls(cam,R.domElement);
  ctrl.enableDamping=true;
  ctrl.dampingFactor=.08;
  ctrl.target.set(0,0,0);

  window.addEventListener("resize",()=>{
    cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();
    R.setSize(innerWidth,innerHeight);
  });

  // Environment for reflections
  const pm=new T.PMREMGenerator(R);
  const es=new T.Scene();
  es.add(new T.Mesh(new T.SphereGeometry(50,16,8),
    new T.MeshBasicMaterial({color:0x404040,side:T.BackSide})));
  [[-8,6,4,0xffffff],[8,4,4,0xdddddd],[0,12,0,0xffffff]].forEach(a=>{
    const m=new T.Mesh(new T.PlaneGeometry(10,8),new T.MeshBasicMaterial({color:a[3]}));
    m.position.set(a[0],a[1],a[2]);m.lookAt(0,0,0);es.add(m);
  });
  scene.environment=pm.fromScene(es,.04).texture;
  pm.dispose();

  // Lights
  scene.add(new T.AmbientLight(0xffffff,.6));
  const k=new T.DirectionalLight(0xffffff,3);
  k.position.set(-5,10,7);k.castShadow=true;
  k.shadow.mapSize.set(2048,2048);
  k.shadow.camera.left=-6;k.shadow.camera.right=6;
  k.shadow.camera.top=6;k.shadow.camera.bottom=-6;
  k.shadow.bias=-.0003;scene.add(k);
  const f=new T.DirectionalLight(0xffffff,1);
  f.position.set(6,3,4);scene.add(f);

  // Shadow floor
  const sf=new T.Mesh(new T.PlaneGeometry(30,30),new T.ShadowMaterial({opacity:.3}));
  sf.rotation.x=-Math.PI/2;sf.position.y=-1.4;sf.receiveShadow=true;scene.add(sf);

  // Load GLB as-is (from same folder, NOT embedded)
  new T.GLTFLoader().load("typewriter.glb",g=>{
    setP(90);
    const m=g.scene;
    const box=new T.Box3().setFromObject(m);
    const c=box.getCenter(new T.Vector3());
    const s=box.getSize(new T.Vector3());
    const sc=3.5/Math.max(s.x,s.y,s.z);
    m.scale.setScalar(sc);
    m.position.copy(c.multiplyScalar(-sc));
    m.position.y+=(-box.min.y*sc)-1.4;
    m.traverse(ch=>{if(ch.isMesh){ch.castShadow=true;ch.receiveShadow=true;}});
    scene.add(m);
    setP(100);
    setTimeout(()=>document.getElementById("loader").classList.add("hide"),400);
  },
  xhr=>{if(xhr.total)setP(20+xhr.loaded/xhr.total*70);},
  err=>{console.error(err);document.getElementById("lt").textContent="ERROR";});

  (function loop(){
    requestAnimationFrame(loop);
    ctrl.update();
    R.render(scene,cam);
  })();
}
</script>
</body>
</html>
