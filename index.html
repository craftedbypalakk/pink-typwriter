<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pink Typewriter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0508}
canvas{display:block}
#loader{position:fixed;inset:0;z-index:100;
  background:radial-gradient(ellipse at 50% 40%,#2a0a1c,#0a0508);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  transition:opacity .7s;font-family:monospace}
#loader.hide{opacity:0;pointer-events:none}
#lt{font-size:11px;letter-spacing:5px;color:#e090b0}
#lb{width:200px;height:2px;background:#3a1828;border-radius:1px;overflow:hidden}
#lp{height:100%;width:0;background:linear-gradient(90deg,#c8507a,#ff9ec4);transition:width .3s}
#hint{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  font-size:10px;letter-spacing:3px;color:rgba(255,170,205,.45);
  z-index:10;pointer-events:none;font-family:monospace}
#mute{position:fixed;top:18px;right:18px;z-index:11;
  background:rgba(60,20,38,.7);border:1px solid rgba(255,150,190,.2);
  color:#f0a0c0;font-family:monospace;font-size:10px;letter-spacing:1px;
  padding:6px 12px;border-radius:4px;cursor:pointer}
</style>
</head>
<body>
<div id="loader"><div id="lt">LOADING</div><div id="lb"><div id="lp"></div></div></div>
<div id="hint">CLICK · THEN TYPE</div>
<button id="mute">♪ SOUND ON</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
const lp=document.getElementById("lp"),setP=p=>lp.style.width=p+"%";
window.addEventListener("load",()=>{if(!window.THREE){document.getElementById("lt").textContent="ERROR";return;}setP(20);init();});

function init(){
const T=THREE;

// ── RENDERER ──────────────────────────────────────────────────
const R=new T.WebGLRenderer({antialias:true});
R.setPixelRatio(Math.min(devicePixelRatio,2));
R.setSize(innerWidth,innerHeight);
R.shadowMap.enabled=true;
R.shadowMap.type=T.VSMShadowMap;
R.outputEncoding=T.sRGBEncoding;
R.toneMapping=T.ACESFilmicToneMapping;
R.toneMappingExposure=0.82;
document.body.appendChild(R.domElement);
const scene=new T.Scene();
scene.background=new T.Color(0x0a0508);
const cam=new T.PerspectiveCamera(45,innerWidth/innerHeight,.01,5000);
addEventListener("resize",()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();R.setSize(innerWidth,innerHeight);});

// ── HDR ENVIRONMENT ───────────────────────────────────────────
const pmg=new T.PMREMGenerator(R);
const es=new T.Scene();
es.add(new T.Mesh(new T.SphereGeometry(50,32,16),new T.MeshBasicMaterial({color:0x0c0a0e,side:T.BackSide})));
const addPanel=(x,y,z,col,w,h)=>{const m=new T.Mesh(new T.PlaneGeometry(w,h),new T.MeshBasicMaterial({color:col,side:T.DoubleSide}));m.position.set(x,y,z);m.lookAt(0,0,0);es.add(m);};
addPanel(-10,9,5,0xfff6f8,14,10);addPanel(10,5,4,0xeef0ff,9,9);
addPanel(0,12,0,0xffffff,16,12);addPanel(0,5,-9,0xffe8f0,11,7);
addPanel(0,0,8,0x180c14,6,6);
const env=pmg.fromScene(es,0.025).texture;
scene.environment=env;scene.environmentIntensity=0.55;pmg.dispose();

// ── LIGHTS ────────────────────────────────────────────────────
scene.add(new T.AmbientLight(0xfff0f4,0.18));
const kL=new T.DirectionalLight(0xfff4f6,2.8);kL.position.set(-6,10,7);kL.castShadow=true;
kL.shadow.mapSize.set(4096,4096);kL.shadow.camera.left=-5;kL.shadow.camera.right=5;
kL.shadow.camera.top=5;kL.shadow.camera.bottom=-5;kL.shadow.bias=-0.0001;kL.shadow.normalBias=0.04;kL.shadow.radius=8;scene.add(kL);
const fL=new T.DirectionalLight(0xe8ecff,0.85);fL.position.set(8,4,4);scene.add(fL);
const rimL=new T.DirectionalLight(0xffdce8,1.8);rimL.position.set(-1,6,-8);scene.add(rimL);
const hairL=new T.DirectionalLight(0xffffff,0.6);hairL.position.set(2,12,2);scene.add(hairL);

// Contact shadow blobs
function makeBlob(size,opacity,ir){
  const c=document.createElement("canvas");c.width=c.height=512;
  const x=c.getContext("2d"),g=x.createRadialGradient(256,256,ir,256,256,256);
  g.addColorStop(0,`rgba(0,0,0,${opacity})`);g.addColorStop(.5,`rgba(0,0,0,${opacity*.4})`);g.addColorStop(1,"rgba(0,0,0,0)");
  x.fillStyle=g;x.fillRect(0,0,512,512);
  const m=new T.Mesh(new T.PlaneGeometry(size,size*.65),new T.MeshBasicMaterial({map:new T.CanvasTexture(c),transparent:true,depthWrite:false,blending:T.MultiplyBlending}));
  m.rotation.x=-Math.PI/2;return m;
}
const blobSharp=makeBlob(5.5,.55,30),blobSoft=makeBlob(9.0,.22,80);
scene.add(blobSharp);scene.add(blobSoft);
const sf=new T.Mesh(new T.PlaneGeometry(30,30),new T.ShadowMaterial({opacity:.38}));
sf.rotation.x=-Math.PI/2;sf.receiveShadow=true;scene.add(sf);

// ── MATERIALS ─────────────────────────────────────────────────
const MM=(c,rg,mt,ei=0.9)=>new T.MeshStandardMaterial({color:new T.Color(c),roughness:rg,metalness:mt,envMap:env,envMapIntensity:ei});
function pinkMat(name){
  const n=(name||"").toLowerCase();
  if(n.includes("chrome"))  return MM(0xeae4ea,.06,1.0,1.8);
  if(n.includes("rubber"))  return MM(0x160810,.88,.1,.08);
  if(n.includes("tape"))    return MM(0x140510,.9,.0,.04);
  if(n.includes("button"))  return MM(0xf2eade,.28,.04,.55);
  if(n.includes("black"))   return MM(0x38101f,.42,.55,.8);
  if(n.includes("measure")) return MM(0xc06f8c,.35,.45,.9);
  if(n.includes("paper"))   return MM(0xf4e4ec,.92,.0,.1);
  if(n.includes("label"))   return MM(0xd8a850,.18,.92,1.6);
  return MM(0xd8467e,.20,.48,0.75);
}

// ── PAPER CANVAS ─────────────────────────────────────────────
const PW=1024,PH=1600;
const pcan=document.createElement("canvas");pcan.width=PW;pcan.height=PH;
const pctx=pcan.getContext("2d");
// Layout
const COLS=38,ROWS=26,MX=160,MY=200,LH=48,FS=32;
const CW=(PW-MX*1.5)/COLS;
let lines=[[]],curRow=0,scrollLines=0,caps=false;
const ptex=new T.CanvasTexture(pcan);
ptex.encoding=T.sRGBEncoding;ptex.anisotropy=R.capabilities.getMaxAnisotropy();

// Character imperfections — stable, permanent per char
const charCache={};
function imperfect(r,c){
  const k=`${r},${c}`;
  if(!charCache[k])charCache[k]={
    ox:(Math.random()-.5)*3.2,oy:(Math.random()-.5)*2.8,
    ink:0.80+Math.random()*0.18,skew:(Math.random()-.5)*0.055,
    sw:0.93+Math.random()*0.14};
  return charCache[k];
}

// Pre-baked grain canvas
const grainCv=document.createElement("canvas");grainCv.width=PW;grainCv.height=PH;
(()=>{
  const gc=grainCv.getContext("2d");
  gc.fillStyle="#F8F2E8";gc.fillRect(0,0,PW,PH);
  const gd=gc.getImageData(0,0,PW,PH);const g=gd.data;
  let s=0x9e3779b9;
  const rnd=()=>{s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/0xffffffff;};
  for(let i=0;i<g.length;i+=4){const n=(rnd()-.5)*13;g[i]=Math.max(0,Math.min(255,g[i]+n));g[i+1]=Math.max(0,Math.min(255,g[i+1]+n*.95));g[i+2]=Math.max(0,Math.min(255,g[i+2]+n*.84));}
  gc.putImageData(gd,0,0);
  for(let f=0;f<280;f++){const fx=rnd()*PW,fy=rnd()*PH,fl=8+rnd()*20,fa=(rnd()-.5)*.22,al=0.025+rnd()*.055;gc.strokeStyle=rnd()>.5?`rgba(255,248,235,${al})`:`rgba(175,155,120,${al})`;gc.lineWidth=.35+rnd()*.45;gc.beginPath();gc.moveTo(fx,fy);gc.lineTo(fx+Math.cos(fa)*fl,fy+Math.sin(fa)*fl);gc.stroke();}
})();

let paperDirty=true;
function drawPaper(){
  pctx.drawImage(grainCv,0,0);
  // Roller shadow at top
  const sh=PH*.07,sg=pctx.createLinearGradient(0,0,0,sh);
  sg.addColorStop(0,"rgba(35,22,12,0.30)");sg.addColorStop(.45,"rgba(35,22,12,0.10)");sg.addColorStop(1,"rgba(35,22,12,0)");
  pctx.fillStyle=sg;pctx.fillRect(0,0,PW,sh);
  // Side vignette
  const lv=pctx.createLinearGradient(0,0,55,0);lv.addColorStop(0,"rgba(28,18,8,0.09)");lv.addColorStop(1,"rgba(28,18,8,0)");pctx.fillStyle=lv;pctx.fillRect(0,0,55,PH);
  const rv=pctx.createLinearGradient(PW,0,PW-55,0);rv.addColorStop(0,"rgba(28,18,8,0.09)");rv.addColorStop(1,"rgba(28,18,8,0)");pctx.fillStyle=rv;pctx.fillRect(PW-55,0,55,PH);
  // Margin line
  pctx.strokeStyle="rgba(175,55,45,0.17)";pctx.lineWidth=1.4;pctx.beginPath();pctx.moveTo(MX-20,0);pctx.lineTo(MX-20,PH);pctx.stroke();
  // Ruled lines
  pctx.strokeStyle="rgba(145,132,108,0.09)";pctx.lineWidth=.8;
  for(let i=0;i<ROWS+2;i++){const y=MY+(i+1)*LH-6;pctx.beginPath();pctx.moveTo(0,y);pctx.lineTo(PW,y);pctx.stroke();}
  // Text
  pctx.font=`${FS}px 'Courier New',Courier,monospace`;pctx.textBaseline="top";
  for(let r=0;r<lines.length;r++){
    const sr=r-scrollLines;if(sr<0||sr>=ROWS)continue;
    const line=lines[r],y=MY+sr*LH;
    for(let c=0;c<line.length;c++){
      const ch=line[c];if(!ch||ch===" ")continue;
      const{ox,oy,ink,skew,sw}=imperfect(r,c);
      pctx.save();pctx.translate(MX+c*CW+ox,y+oy);pctx.rotate(skew);pctx.scale(sw,1);
      pctx.fillStyle=`rgba(18,12,20,${ink})`;pctx.fillText(ch,0,0);
      if(ink>0.93){pctx.globalAlpha=0.25;pctx.fillStyle="rgba(10,6,14,1)";pctx.fillText(ch,.4,.3);pctx.globalAlpha=1;}
      pctx.restore();
    }
  }
  ptex.needsUpdate=true;paperDirty=false;
}

// ── SOUNDS ────────────────────────────────────────────────────
let AC=null,muted=false;
const ac=()=>{if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;};
function sndKey(){if(muted)return;const c=ac(),t=c.currentTime;const buf=c.createBuffer(1,c.sampleRate*.06,c.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,4)*.6;const src=c.createBufferSource();src.buffer=buf;const g=c.createGain();g.gain.value=.22;src.connect(g);g.connect(c.destination);src.start(t);const o=c.createOscillator(),og=c.createGain();o.frequency.value=180+Math.random()*80;o.type="sine";og.gain.setValueAtTime(.08,t);og.gain.exponentialRampToValueAtTime(.001,t+.05);o.connect(og);og.connect(c.destination);o.start(t);o.stop(t+.06);}
function sndSpace(){if(muted)return;const c=ac(),t=c.currentTime;const o=c.createOscillator(),g=c.createGain();o.frequency.value=260;o.type="sine";g.gain.setValueAtTime(.10,t);g.gain.exponentialRampToValueAtTime(.001,t+.07);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.08);}
function sndBell(){if(muted)return;const c=ac(),t=c.currentTime;[1760,3520,5280].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.frequency.value=f;o.type="sine";g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(.15/(i+1),t+.003);g.gain.exponentialRampToValueAtTime(.0001,t+1.4-i*.3);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+1.5);});}
function sndReturn(){if(muted)return;const c=ac(),t=c.currentTime;for(let i=0;i<14;i++){const tt=t+i*.018+Math.random()*.006,o=c.createOscillator(),g=c.createGain();o.type="square";o.frequency.value=400+Math.random()*200;g.gain.setValueAtTime(.04,tt);g.gain.exponentialRampToValueAtTime(.001,tt+.015);o.connect(g);g.connect(c.destination);o.start(tt);o.stop(tt+.02);}const o=c.createOscillator(),g=c.createGain();o.frequency.value=120;o.type="sine";g.gain.setValueAtTime(.14,t+.26);g.gain.exponentialRampToValueAtTime(.001,t+.5);o.connect(g);g.connect(c.destination);o.start(t+.26);o.stop(t+.55);}
function sndRoller(){if(muted)return;const c=ac(),t=c.currentTime;const o=c.createOscillator(),g=c.createGain();o.frequency.value=80;o.type="sine";g.gain.setValueAtTime(.06,t);g.gain.exponentialRampToValueAtTime(.001,t+.12);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.14);}
document.getElementById("mute").onclick=e=>{muted=!muted;e.target.textContent=muted?"♪ MUTED":"♪ SOUND ON";e.target.blur();};

// ─────────────────────────────────────────────────────────────
// THE MECHANICAL SYSTEM
// ─────────────────────────────────────────────────────────────
//
// Physical model:
//
//   modelRoot (Three.js scene object)
//   └── carriageNode   ← slides left as you type
//       └── paperGrp   ← child of carriage, moves with it
//           └── paperMesh (curved plane)
//           └── paper texture carries the typed text
//
//   Platen rotation → paperGrp.position.y (feed upward)
//   Carriage column → carriageNode.position.x (slides left)
//   Text column     → derived from carriageCol, painted on texture
//
// NOTHING moves independently. Paper is bolted to carriage.
// Carriage is bolted to model. Platen rotation feeds paper up.
// ─────────────────────────────────────────────────────────────

let modelRoot=null;
let carriageNode=null;   // Object3D that slides left as you type
let paperGrp=null;       // child of carriageNode — paper sheet
let paperMesh=null;

// Machine vibration
let machineVibX=0,machineVibY=0,machineVibRot=0;
function kickMachineVib(){
  machineVibX+=(Math.random()-.5)*0.004;
  machineVibY+=(Math.random()-.5)*0.003;
  machineVibRot+=(Math.random()-.5)*0.002;
}

// Platen — controls paper feed
// Each line advance = platenRotPerLine radians
// platenRotAccum drives paperGrp.position.y (in platen-local space → world Y)
let platenRotAccum=0;      // total rotation accumulated
let platenRotTarget=0;     // target (incremented on newline)
let platenRotPerLine=0;    // set after model loads: radians per line
let platenRadiusWorld=0;   // set after model loads: roller radius in world units
let ribbonMeshes=[];
let ribbonStrike=0;

// Carriage — controls typing position
let carriageCol=0;         // integer column, source of truth
let carriageTargetX=0;     // world X target for carriageNode
let charWorldWidth=0;      // world units per column
let carriageReturning=false;
const BELL_COL=COLS-6;
const RIGHT_MARGIN=COLS-1;

function carriageAdvance(){
  if(carriageCol>=RIGHT_MARGIN)return;
  carriageCol++;
  // carriageNode moves LEFT as column increases
  carriageTargetX=-carriageCol*charWorldWidth;
  if(carriageCol===BELL_COL)sndBell();
}
function carriageBackspace(){
  if(carriageCol<=0)return;
  carriageCol--;
  carriageTargetX=-carriageCol*charWorldWidth;
}
function carriageReturnSnap(){
  carriageCol=0;carriageTargetX=0;
}

// Paper feed — driven by platen rotation
// Each newline: platenRotTarget += platenRotPerLine
// Render loop lerps platenRotAccum → platenRotTarget
// paperGrp.position.y = platenRotAccum * platenRadiusWorld  (arc = angle × radius)
function platenAdvance(){
  platenRotTarget+=platenRotPerLine;
}

// Text — column position comes from carriageCol at time of commit
function commitChar(ch){
  if(carriageCol>=RIGHT_MARGIN)return;
  const col=carriageCol;
  const row=curRow;
  if(!lines[row])lines[row]=[];
  lines[row][col]=ch;
  paperDirty=true;
  carriageAdvance();
  // Side-effects
  machineVibX+=(Math.random()-.5)*0.003;
  machineVibY+=Math.random()*0.002;
  ribbonStrike=1.0;
}

function doNewline(){
  curRow++;
  if(!lines[curRow])lines[curRow]=[];
  if(curRow-scrollLines>=ROWS-2)scrollLines++;
  // Platen drives paper up — this is the ONLY place paper moves vertically
  platenAdvance();
  paperDirty=true;
}

function doBackspace(){
  if(carriageCol>0){
    carriageBackspace();
    delete charCache[`${curRow},${carriageCol}`];
    if(lines[curRow])lines[curRow][carriageCol]=null;
    paperDirty=true;
  } else if(curRow>0){
    curRow--;
    carriageCol=(lines[curRow]||[]).length;
    carriageTargetX=-carriageCol*charWorldWidth;
  }
}

// Key animation
const keyMap={};let keysReady=false;
const PRESS_DIST=-1.2;
function pressKey(code){
  if(!keysReady)return;
  const parts=keyMap[code];if(!parts)return;
  parts.forEach(o=>{if(o.userData.origZ===undefined)o.userData.origZ=o.position.z;o.position.z=o.userData.origZ+PRESS_DIST;});
}
function releaseKey(code){
  const parts=keyMap[code];if(!parts)return;
  const s0=parts.map(o=>o.position.z);
  const t0=parts.map(o=>o.userData.origZ??o.position.z);
  const ts=performance.now();
  (function sp(now){const p=Math.min((now-ts)/130,1);const e=p>=1?1:1-Math.pow(2,-10*p)*Math.cos((p*10-.75)*(Math.PI*2/3));parts.forEach((o,i)=>o.position.z=s0[i]+(t0[i]-s0[i])*e);if(p<1)requestAnimationFrame(sp);else parts.forEach((o,i)=>o.position.z=t0[i]);})(performance.now());
}

// ── MECHANICAL KEYSTROKE SEQUENCER ───────────────────────────
function mechanicalStroke(code,ch){
  pressKey(code);kickMachineVib();
  const delay=46+Math.random()*10;
  setTimeout(()=>sndKey(),delay);
  setTimeout(()=>commitChar(ch),delay+6);
  setTimeout(()=>releaseKey(code),180);
}
function mechanicalSpace(code){
  pressKey(code);kickMachineVib();
  const delay=30+Math.random()*8;
  setTimeout(()=>sndSpace(),delay);
  setTimeout(()=>commitChar(" "),delay+5);
  setTimeout(()=>releaseKey(code),160);
}
function mechanicalBackspace(code){
  pressKey(code);kickMachineVib();
  setTimeout(()=>{sndKey();doBackspace();},35);
  setTimeout(()=>releaseKey(code),160);
}

// ── CARRIAGE RETURN ───────────────────────────────────────────
function doCarriageReturn(code){
  if(carriageReturning)return;
  carriageReturning=true;
  pressKey(code);kickMachineVib();

  // t=40ms: ratchet, carriage flies left
  setTimeout(()=>{
    sndReturn();
    const startX=carriageNode?carriageNode.position.x:0;
    const t0=performance.now();
    (function slide(now){
      const p=Math.min((now-t0)/220,1);
      const e=1-Math.pow(1-p,3); // fast cubic ease-out
      if(carriageNode)carriageNode.position.x=startX+(0-startX)*e;
      if(p<1)requestAnimationFrame(slide);
      else{carriageReturnSnap();if(carriageNode)carriageNode.position.x=0;carriageReturning=false;}
    })(performance.now());
  },40);

  // t=60ms: platen rotates, paper feeds up, roller sound
  setTimeout(()=>{
    sndRoller();
    doNewline(); // increments platenRotTarget
    kickMachineVib();
  },60);

  setTimeout(()=>releaseKey(code),300);
}

// ── KEYBOARD EVENTS ───────────────────────────────────────────
const hint=document.getElementById("hint");let hintGone=false;
let AC_resumed=false;
addEventListener("keydown",e=>{
  if(!AC_resumed&&AC){AC.resume();AC_resumed=true;}
  if(!hintGone){hint.style.display="none";hintGone=true;}
  if(e.metaKey||e.ctrlKey||e.altKey)return;
  const k=e.key;
  if(k==="Backspace"){e.preventDefault();mechanicalBackspace(e.code);return;}
  if(k==="Enter"){e.preventDefault();doCarriageReturn(e.code);return;}
  if(k==="CapsLock"){caps=!caps;return;}
  if(k==="Shift"||k==="Tab"||k==="Escape"||k.startsWith("Arrow")||k==="Control"||k==="Alt"||k==="Meta"){if(k==="Tab")e.preventDefault();return;}
  if(k===" "){e.preventDefault();mechanicalSpace(e.code);return;}
  if(k.length===1){
    e.preventDefault();
    let c=k;
    if(caps&&/[a-z]/.test(c))c=c.toUpperCase();
    else if(caps&&/[A-Z]/.test(c)&&!e.shiftKey)c=c.toLowerCase();
    mechanicalStroke(e.code,c);
  }
});
addEventListener("keyup",e=>{if(["ShiftLeft","ShiftRight"].includes(e.code))releaseKey(e.code);});
// Resume AudioContext on first interaction
document.addEventListener("pointerdown",()=>{if(AC&&AC.state==="suspended")AC.resume();},{once:true});

// ── LOAD MODEL ────────────────────────────────────────────────
new T.GLTFLoader().load("typewriter_rigged.glb",g=>{
  setP(90);
  const m=g.scene;

  // Apply materials
  m.traverse(ch=>{
    if(!ch.isMesh)return;
    ch.castShadow=ch.receiveShadow=true;
    const arr=Array.isArray(ch.material)?ch.material:[ch.material];
    ch.material=arr.map(o=>{const nm=pinkMat(o&&o.name);nm.map=null;if(o&&o.normalMap){nm.normalMap=o.normalMap;nm.normalScale.set(.6,.6);}return nm;});
    if(ch.material.length===1)ch.material=ch.material[0];
    const n=(ch.name||"").toLowerCase();
    if(n.includes("tape")||n.includes("ribbon"))ribbonMeshes.push(ch);
  });

  // Scale + center
  const b0=new T.Box3().setFromObject(m);
  const c0=b0.getCenter(new T.Vector3());
  const s0=b0.getSize(new T.Vector3());
  const scl=4/Math.max(s0.x,s0.y,s0.z);
  m.scale.setScalar(scl);m.position.set(-c0.x*scl,-c0.y*scl,-c0.z*scl);
  scene.add(m);m.updateMatrixWorld(true);
  modelRoot=m;m.userData.baseX=m.position.x;m.userData.baseY=m.position.y;

  // World bounds
  const box=new T.Box3().setFromObject(m);
  const c=box.getCenter(new T.Vector3());
  const s=box.getSize(new T.Vector3());

  // ── CARRIAGE NODE ─────────────────────────────────────────
  // A Group that sits at the model's center and slides left
  carriageNode=new T.Group();
  carriageNode.position.set(0,0,0); // offset from model root
  m.add(carriageNode); // carriage is a CHILD of modelRoot

  // charWorldWidth: typeable width / COLS, in model-local units
  // (before model scale — we work in model-local coords here)
  // Model local X span ≈ s0.x (pre-scale). Post-scale: s.x = s0.x*scl
  // carriageNode is child of m which has scale=scl, so carriageNode positions are in world space
  charWorldWidth=(s.x*0.78)/COLS;

  // ── PAPER — child of carriageNode ────────────────────────
  // Paper moves with carriage (X) and platen (Y). Nothing else moves it.
  const pw=s.x*0.42;
  const ph=pw*(PH/PW);

  // Platen geometry: radius and tangent point from GLB rubber mesh
  // From analysis: platen tangent = box.max.y, radius ≈ s.y*0.065
  platenRadiusWorld=s.y*0.065;
  // Rotation per line: arc = LH/PH fraction of paper height
  // paper world height = ph, one line = ph*(LH/PH)
  // arc = angle * radius → angle = arc/radius
  platenRotPerLine=(ph*(LH/PH))/platenRadiusWorld;

  // Paper geometry — wraps around roller
  const VISIBLE=0.40;
  const seg=24;
  const geo=new T.PlaneGeometry(pw,ph,1,seg);
  const pos=geo.attributes.position;
  for(let i=0;i<pos.count;i++){
    const ly=pos.getY(i),t=(ly/ph)+0.5;
    if(t<VISIBLE){
      const u=(VISIBLE-t)/VISIBLE,angle=u*u*(Math.PI*0.38);
      pos.setZ(i,-platenRadiusWorld*(1-Math.cos(angle)));
      pos.setY(i,ly-platenRadiusWorld*Math.sin(angle)*0.3);
    } else {
      const u=(t-VISIBLE)/(1-VISIBLE);
      pos.setZ(i,platenRadiusWorld*0.04*(1-u));
    }
  }
  pos.needsUpdate=true;geo.computeVertexNormals();

  const mat=new T.MeshStandardMaterial({map:ptex,roughness:1.0,metalness:0,envMap:env,envMapIntensity:.04,side:T.DoubleSide});
  paperMesh=new T.Mesh(geo,mat);paperMesh.castShadow=true;
  paperGrp=new T.Group();paperGrp.add(paperMesh);

  // Paper base position in carriage-local space:
  // X=0 (centered), Y=platen tangent, Z=platen face
  // Tangent in model world: box.max.y
  // But carriageNode is child of m, so position is in m-local = same as world here (m.position is the centering offset)
  // platen tangent in m-local: box.max.y (world) - m.position.y = box.max.y - (-c0.y*scl) = box.max.y + c0.y*scl
  // Actually since carriageNode is a child of m and m is already placed, we use world coords relative to m
  const tangentLocal=box.max.y-m.position.y; // platen top in m-local Y
  const paperBaseLocalY=tangentLocal+ph*(0.5-VISIBLE);
  const paperBaseLocalZ=(box.max.z-m.position.z)*0.04;

  paperGrp.position.set(0,paperBaseLocalY,paperBaseLocalZ);
  paperGrp.userData.baseLocalY=paperBaseLocalY;
  carriageNode.add(paperGrp); // paper is bolted to carriage

  // Key map — collected after matrixWorld update
  const kp={};
  m.traverse(ch=>{
    const nn=ch.name||"";
    if(!nn.startsWith("Key_"))return;
    let base=nn.replace(/_part\d+$/,"").replace(/_mesh$/,"");
    const code=base.replace("Key_","").trim();
    if(code.includes("Extra"))return;
    if(!kp[code])kp[code]=[];
    kp[code].push(ch);
  });
  Object.entries(kp).forEach(([code,objs])=>{
    keyMap[code]=objs;objs.forEach(o=>o.userData.origZ=o.position.z);
  });
  keysReady=true;
  console.log("Keys:",Object.keys(keyMap).length);

  // Shadow floor + contact blobs
  sf.position.y=box.min.y;
  [blobSharp,blobSoft].forEach(b=>{b.position.y=box.min.y+0.005;b.scale.set(s.x/4.5,1,s.z/3);});

  // Camera: 11° elevation, model fills 80% viewport
  const FOV_RAD=cam.fov*Math.PI/180;
  const dist=(s.y/2)/Math.tan(FOV_RAD/2)/0.42;
  const elev=14*Math.PI/180;
  cam.position.set(c.x,c.y+dist*Math.sin(elev),c.z+dist*Math.cos(elev));
  cam.lookAt(c.x,c.y+s.y*0.08,c.z);cam.updateProjectionMatrix();

  drawPaper();
  setP(100);setTimeout(()=>document.getElementById("loader").classList.add("hide"),500);
},
xhr=>{if(xhr.total)setP(20+xhr.loaded/xhr.total*70);},
err=>{console.error(err);document.getElementById("lt").textContent="ERROR";});

// ── RENDER LOOP ───────────────────────────────────────────────
let idleT=0,t0=performance.now();

(function loop(now){
  requestAnimationFrame(loop);
  const dt=Math.min((now-t0)/1000,.05);t0=now;idleT+=dt;

  // ── Platen rotation → paper feed (source of truth for Y) ──
  if(platenRotAccum!==platenRotTarget){
    platenRotAccum+=(platenRotTarget-platenRotAccum)*0.14;
    if(Math.abs(platenRotTarget-platenRotAccum)<0.0001)platenRotAccum=platenRotTarget;
    // Paper Y = base + accumulated arc length
    if(paperGrp){
      paperGrp.position.y=paperGrp.userData.baseLocalY+platenRotAccum*platenRadiusWorld;
    }
  }

  // ── Carriage X → carriageNode slide (source of truth for X) ──
  if(carriageNode&&!carriageReturning){
    carriageNode.position.x+=(carriageTargetX-carriageNode.position.x)*0.35;
  }

  // ── Machine vibration decay ────────────────────────────────
  machineVibX*=0.72;machineVibY*=0.72;machineVibRot*=0.72;

  // ── Idle breathing (extremely subtle) ─────────────────────
  const breathe=Math.sin(idleT*.41)*.00028+Math.sin(idleT*.97)*.00012+Math.sin(idleT*2.13)*.00006;
  const breatheY=Math.sin(idleT*.38)*.00020+Math.sin(idleT*.91)*.00008;
  const vib=Math.abs(machineVibX)+Math.abs(machineVibY);
  const ib=Math.max(0,1-vib*80);

  if(modelRoot){
    modelRoot.position.x=modelRoot.userData.baseX+machineVibX+breathe*ib;
    modelRoot.position.y=modelRoot.userData.baseY+machineVibY+breatheY*ib;
    modelRoot.rotation.z=machineVibRot;
  }

  // ── Ribbon strike flash ────────────────────────────────────
  ribbonStrike*=0.78;
  if(ribbonMeshes.length>0&&ribbonStrike>0.01){
    ribbonMeshes.forEach(r=>{if(r.material){r.material.emissive=new T.Color(.08*ribbonStrike,0,.04*ribbonStrike);r.material.emissiveIntensity=ribbonStrike;}});
  }

  // ── Idle light variation ───────────────────────────────────
  rimL.intensity=1.8*(1+Math.sin(idleT*.19)*.04+Math.sin(idleT*.53)*.02);
  hairL.intensity=0.6+Math.sin(idleT*.31)*.03;

  if(paperDirty)drawPaper();
  R.render(scene,cam);
})(performance.now());
}
</script>
</body>
